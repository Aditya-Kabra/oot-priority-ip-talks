<script>
const TALKS = {"copyrights": {"title": "Only Copyrights! (Part 2 of Only One Theme: An Awareness Campaign on Innovation Management)", "shortTitle": "Copyrights", "speaker": "Latha Nair, Partner at K&S Partners", "role": "Chairs the Trademark, Copyright, and Geographical Indications practice at K&S Partners. Advises production and media houses and social media companies on copyright issues, and has assisted the Government of India in protecting geographical indications like Basmati rice and Darjeeling tea both in India and abroad.", "overview": "A founder-facing guide to how copyright actually works in India, what it protects, who owns it, and why registration is optional but a copyright notice is not something to skip. It covers the legal tests courts use to catch copying, and closes with practical habits, like dating a website's content, that decide whether you can prove ownership later.", "videoId": "ynVL4Vqro6g", "videoUrl": "https://www.youtube.com/watch?v=ynVL4Vqro6g", "duration": "1 hour 7 min", "readMin": 21, "articleMin": 13, "takeaways": "<p>If you create written, visual, musical, or software work and want to know what protects it, this is what the talk covers.</p>\n<ul>\n<li>Copyright protects the expression of an idea, not the idea itself. Two people can paint the same sunset and each hold copyright in their own version, because the underlying idea was never protectable to begin with.</li>\n<li>Registration is not mandatory in India. Copyright exists automatically the moment you create a work, confirmed by the 2021 case Sanjay Soya v. Narayani Trading Co., though a registration certificate helps as evidence and can matter in practice with police.</li>\n<li>A copyright notice, the © symbol with a year and your name, is one of the cheapest protections available and should go on every website, brochure, and social media post, because without a dated notice, proving you created something first becomes very hard.</li>\n<li>Term length depends on the work. Literary, dramatic, musical, and artistic works are protected for the life of the author plus 60 years, while films, sound recordings, and government works get 60 years from first publication.</li>\n<li>Courts test infringement by asking whether an ordinary viewer who has seen both works would get an unmistakable impression that one copied the other, and even trivial or de minimis copying, like a 10 second song clip in an ad, can escape liability.</li>\n<li>Software gets only thin copyright protection, covering the specific way source code is written, not the underlying functionality or ideas, which is why so few Indian cases actually litigate software copying.</li>\n</ul>\n<p>---</p>", "summary": "<p><strong>What copyright protects.</strong> Copyright covers original literary, dramatic, musical, and artistic works, plus cinematograph films and sound recordings, called mechanical rights because machines create them. Original means the original expression of an idea, not the idea itself, so two people working from the same idea each get separate copyright in their own expression of it.</p>\n<p><strong>Where the line for originality sits.</strong> Indian courts once used a low “sweat of the brow” bar based purely on effort, but the Supreme Court's 2008 ruling in Eastern Book Company v. D.B. Modak set a middle standard: a work is original if selecting, coordinating, or arranging existing material produces something different in character, landing between mere effort and a real spark of creativity.</p>\n<p><strong>Registration is optional.</strong> Copyright exists automatically upon creation. A registration certificate only serves as prima facie evidence of ownership in court, and the 2021 case Sanjay Soya v. Narayani Trading Co. confirmed both civil and criminal remedies are available without any registration at all. In practice, registering still helps, since police handling a criminal piracy complaint often expect to see a certificate.</p>\n<p><strong>Who owns a copyrighted work.</strong> The creator is normally the author and owner, whether a writer, composer, painter, photographer, or film producer. A journalist's articles for a newspaper belong to the newspaper as a collective work, but the journalist can still later compile and publish their own individually written pieces separately. Government works and works of public undertakings belong to the government.</p>\n<p><strong>What owning copyright is worth.</strong> Copyright grants economic rights: to reproduce, issue copies, perform or communicate publicly, adapt, or translate a work. J.K. Rowling's rise from financial hardship to billionaire status through book royalties is the illustrative example of what these rights can be worth over time.</p>\n<p><strong>Assigning and licensing.</strong> Unlike a trademark, which must be assigned as a whole, copyright's separate economic rights can be split up and assigned or licensed individually. Any assignment must be in writing, signed, and specify the rights, duration, territory, and payment, or the law presumes a 5 year term limited to India.</p>\n<p><strong>How long protection lasts.</strong> Literary, dramatic, musical, and artistic works are protected for the life of the author plus 60 years. Films, sound recordings, and government works get 60 years from first publication. Moral rights, like the right to prevent distortion of a work, last for the life of the copyright and cannot be signed away, as shown by a Delhi High Court case ordering a damaged mural restored to its original form.</p>\n<p><strong>Catching infringement.</strong> Courts ask whether an ordinary viewer who saw both works would get an unmistakable impression that one copied the other, focusing on the expression, not shared themes or ideas. A defense called fair dealing permits private use, criticism, review, and reporting of current events, and courts also excuse truly trivial, or de minimis, copying, such as a brief unlicensed song clip in an educational ad.</p>\n<p><strong>Practical protection habits.</strong> A dated copyright notice, the © symbol, a year, and the owner's name, on every website, brochure, and social media post is simple, cheap, and often the only real evidence of when a work was created. For a growing website, the notice can use a year range that gets extended with each new version.</p>\n<p>---</p>", "article": "<h3 id=\"what-the-copyright-act-actually-protects\">What the Copyright Act actually protects</h3>\n<p>India's Copyright Act governs copyright law, and its last amendment came in 2021, when the Intellectual Property Appellate Board (IPAB) was abolished, a change the speaker described as procedural rather than a substantive shift in what the law protects.</p>\n<p>The Act protects original literary, dramatic, musical, and artistic works. The word original here refers to the original expression of an idea, not the idea itself. If two people each set out to paint the same sunset, both end up owning copyright in their own painting, because what is protected is each person's distinct expression, not the shared underlying idea of a sunset. The Act separately protects cinematograph films and sound recordings, which the speaker calls mechanical rights, since they are created through mechanical rather than purely creative means.</p>\n<p>Each category covers specific kinds of work. Literary works include novels, company brochures, website content, and computer programs or software. Dramatic works include choreography, screenplays, and storyboards. Musical works are musical compositions and their notations, which must be fixed or written down on some medium to count. Artistic works include paintings, sculptures, photographs, and works of architecture. Cinematograph films cover any audiovisual work, even one shot casually on a personal camera. Sound recordings cover recorded audio, songs, and background music.</p>\n<h3 id=\"who-qualifies-for-protection\">Who qualifies for protection</h3>\n<p>Section 13 of the Copyright Act sets the eligibility rules. A work qualifies if it is published in India, or if published outside India, the author was an Indian citizen on the date of publication. It also qualifies if the author died before publication but was an Indian citizen at the time of death, or, for an unpublished work, if the author was a citizen of or domiciled in India when the work was made. A work of architecture qualifies if the physical structure itself is located in India. Because India is a signatory to the Berne Convention, the Universal Copyright Convention, and the International Copyright Order of 1999, works published in other member countries are protected in India as though they had been first published there.</p>\n<h3 id=\"setting-the-bar-for-originality\">Setting the bar for originality</h3>\n<p>The Act does not define originality, so the standard has developed through case law. Indian courts long followed a “sweat of the brow” principle, protecting a work based simply on the effort invested in making it, a standard that originated in the case University of London Press v. University Tutorial Press.</p>\n<p>That changed with the Supreme Court of India's 2008 decision in Eastern Book Company v. D.B. Modak. Eastern Book Company, which publishes Supreme Court case reports, took raw court judgments and added value through headnotes and cross-references. When a competitor copied this enhanced version, the defense argued that judgments themselves are not copyrightable. The Supreme Court agreed that raw judgments are not protectable, but found that Eastern Book Company's selection, coordination, and arrangement of pre-existing material had produced a genuinely different work in character. The Court explicitly rejected applying a bare “modicum of creativity” test, instead settling on a standard somewhere between sweat of the brow and modicum of creativity: enough skill in selection or arrangement to produce a work distinct in character from the source material. This remains the operative originality test in India today.</p>\n<h3 id=\"ideas-versus-their-expression\">Ideas versus their expression</h3>\n<p>A foundational principle in copyright is that there is no copyright in an idea itself, only in its expression. The landmark case here is R.G. Anand v. Delux Films. A playwright had written and successfully staged a play, after which a film producer approached him seeking rights to adapt it into a movie. The producer then went quiet, and months later the playwright discovered a film had been made anyway. When confronted, the producer denied any similarity, but the released film, titled New Delhi, closely resembled the play.</p>\n<p>The Supreme Court held that protection is confined to the expression of an idea in some concrete form, not to the idea or information itself. The Court set out principles still applied by Indian courts today. When two works arise from the same idea, some similarity is inevitable, so the real question is whether the similarities go to a fundamental or substantial part of the actual mode of expression. If the same theme is presented and treated differently, there is no violation. The touchstone test is whether an ordinary reader, spectator, or viewer who has experienced both works comes away with a clear, unmistakable impression that the later work is a copy of the earlier one. The Court also noted that broad or material dissimilarities between two works can undercut any suggestion of copying, and that similarities that are clearly coincidental do not amount to infringement.</p>\n<h3 id=\"is-registration-mandatory\">Is registration mandatory?</h3>\n<p>No. Copyright exists automatically the moment a qualifying work is created; a registration certificate is not required to hold the right, only to serve as prima facie evidence of ownership if a dispute reaches court. Section 45 of the Act uses permissive language, saying an owner “may” apply for registration, not that they must.</p>\n<p>In practice, the speaker generally advises clients not to bother registering unless there is a specific risk, such as software piracy, because criminal enforcement in practice, especially with police in rural India, often runs more smoothly when a registration certificate can be shown, even though it is not legally required.</p>\n<p>Indian courts had been divided on this question for years, with some High Courts, including the Bombay High Court, at times treating registration as mandatory. The important 2021 decision in Sanjay Soya v. Narayani Trading Co. resolved the split, holding that registration is not mandatory and that both civil and criminal remedies for infringement are available without it. The court went so far as to find that its own earlier ruling in a case involving Dhiraj Dharamdas and Sonal Info Systems had been decided without proper regard to the law. Its reasoning rested on three points: no provision in the Act actually requires registration; the Act's own legislative history shows an early draft that would have barred infringement suits without registration, a requirement that was deliberately dropped before the final Act was passed; and the Berne Convention, to which India is a signatory, requires member countries to grant equal protection to works from other member countries without imposing formalities like registration.</p>\n<h3 id=\"who-owns-a-work-and-the-newspaper-exception\">Who owns a work, and the newspaper exception</h3>\n<p>The person who creates a work is generally its author and owner: the writer of a text, the musician who writes down the notation, the painter or photographer, or the producer of a film or sound recording. For a computer-generated literary, dramatic, musical, or artistic work, the person who causes the work to be created is treated as its author.</p>\n<p>There are structured exceptions for employment. A journalist's articles, whether written as a staff employee or as a freelancer commissioned by a newspaper, belong to the newspaper as the collective work's author and owner. But this ownership is limited to the collective publication itself. If that journalist later leaves and wants to compile their own individually written articles into a personal book, the newspaper has no claim to stop them, since those are the journalist's own works, simply published as part of a collective work at the time.</p>\n<p>Government works, including legislation and court judgments, are owned by the government, and the same principle applies to works created by public undertakings and international organizations.</p>\n<h3 id=\"the-economic-case-for-copyright\">The economic case for copyright</h3>\n<p>Copyright exists in large part because it lets creators derive economic benefit from their work. The speaker's example is J.K. Rowling, who went from significant financial hardship to becoming a billionaire through royalties earned from her novels, illustrating the scale of value copyright can eventually unlock.</p>\n<p>The specific economic rights vary by type of work. For literary, dramatic, and musical works, the owner can reproduce the work in material form, issue copies, perform it in public or communicate it to the public, make a sound recording or film of it, and make adaptations or translations, for instance translating an English novel into another language or adapting it into a screenplay and film, the kind of arrangement behind a production house acquiring film rights to a popular novel. Artistic works carry similar rights, including reproducing a two-dimensional work in three dimensions or vice versa, communicating it to the public, and including it in a film. Computer programs carry all the rights of literary works plus the right to commercial rental. Cinematograph films carry the right to copy the film (including still photographs from it, such as movie posters used for advertising), to sell or offer copies for sale, to give the film out on commercial rental, and to communicate it to the public; the speaker notes that unauthorized video rental parlors, common in India through the 1990s, were shut down once courts established that commercial rental is an exclusive right belonging to the copyright owner. Sound recordings carry a similar bundle of rights: making another recording that embodies the original, offering it for sale, communicating it to the public, and commercial rental.</p>\n<h3 id=\"assigning-and-licensing-a-copyright\">Assigning and licensing a copyright</h3>\n<p>Sections 18 and 19 of the Act cover assignment, and Section 30 covers licensing. Assignment functions like a sale of a specific right, while licensing leaves ownership with the original owner and grants only certain permitted uses. Unlike a trademark, which must be assigned in its entirety, copyright is a bundle of separate economic rights that can each be assigned or licensed independently. An author could, for example, assign only the film adaptation rights to a novel while keeping the rights to publish it, make audiobooks, or otherwise exploit it themselves.</p>\n<p>A valid assignment or license must be in writing and signed by the assignor or licensor. It must specify the work and the exact rights being assigned, the duration, and the territorial extent, since the law presumes a 5 year term if duration is not stated, and presumes the rights are limited to India if territory is not stated. It must also specify the royalty or other consideration to be paid. If the assigned rights go unexercised for a full year, they revert automatically to the original owner. For works with joint authors, all co-authors must consent before the work can be exploited; no single co-author can unilaterally license or assign it.</p>\n<h3 id=\"how-long-protection-lasts\">How long protection lasts</h3>\n<p>For literary, dramatic, musical, and artistic works, copyright lasts for the life of the author plus 60 years, counted from the beginning of the calendar year following the author's death. The author Mahasweta Devi, who died on 28 July 2016, is the example given: her works remain in copyright through her death, and then for a further 60 years starting 1 January 2017.</p>\n<p>For cinematograph films, sound recordings, government works, and works of public undertakings, the term is instead 60 years from the beginning of the calendar year following first publication. The film Brahmastra, released on 9 September 2022, is the example given: its 60-year term is calculated starting 1 January 2023.</p>\n<h3 id=\"moral-rights-and-neighboring-rights\">Moral rights and neighboring rights</h3>\n<p>Alongside the economic rights above, the Act grants moral rights: the right to claim authorship of a work, the right to the integrity of the work, meaning the right to restrain or claim damages for distortion or mutilation, and the right to attribution. These moral rights cannot be assigned or waived away, unlike the economic rights.</p>\n<p>An illustrative Delhi High Court case involved a large mural kept at Vigyan Bhavan. During a renovation, those responsible for the building removed the mural and left it dumped in a corner. The artist who had created it sued the Union of India, and the court upheld the artist's right to integrity, ordering the mural restored to its original condition and location.</p>\n<p>The Act also protects neighboring, or related, rights. Broadcasting organizations, such as TV channels, hold a broadcast reproduction right lasting 25 years. Performers, defined under Section 38 as actors, singers, musicians, dancers, or people delivering a lecture, hold performer's rights over live visual or acoustic presentations. These rights include making a sound or visual recording of a performance, or broadcasting or communicating it to the public, except where it has already been broadcast. A 2017 amendment added moral rights for performers as well: the right to be identified as the performer, and the right to restrain or claim damages for distortion of the performance. Performer's rights last 25 years from the beginning of the calendar year following the year the performance was given.</p>\n<h3 id=\"what-counts-as-infringement\">What counts as infringement</h3>\n<p>Section 51 of the Act defines infringement. Primary infringement occurs when someone exercises any of the exclusive rights under Section 14 without permission, or breaches the terms of a license they were granted; it also covers selling, letting for hire, offering for sale or hire, distributing, exhibiting, or importing infringing copies. Secondary infringement occurs when a platform, for profit, knowingly permits unauthorized communication of a work to the public, meaning it facilitates infringement without directly committing the copying itself.</p>\n<p>The R.G. Anand case, discussed earlier for the idea-expression dichotomy, also laid down the operative test for spotting infringement, one still applied by Indian courts today. Because some similarity is inevitable when two works share an underlying idea, courts look specifically at whether the similarity touches a fundamental or substantial part of the actual mode of expression. The central test remains whether an ordinary reader, spectator, or viewer who has experienced both works forms a clear, unmistakable impression that the later work copies the earlier one. If the same theme is treated differently, there is no violation, and broad, material dissimilarities between the two works, or clearly incidental or coincidental overlaps, can defeat a claim of infringement.</p>\n<h3 id=\"remedies-fair-dealing-and-trivial-copying\">Remedies, fair dealing, and trivial copying</h3>\n<p>Civil remedies for infringement include injunction, damages, and an account of the infringer's profits. Criminal remedies include imprisonment and fines ranging from 50,000 to 200,000 rupees.</p>\n<p>Section 52 of the Act, one of its longest provisions at roughly two and a half pages, lists acts that do not amount to infringement. The core fair dealing categories are private or personal use, including research, criticism or review, and reporting of current events and current affairs, including reporting a lecture delivered in public. Beyond these three, the section separately carves out exceptions for education, archival purposes, and use by visually impaired persons, among others.</p>\n<p>The speaker illustrated how narrowly some of these exceptions are actually read with a real client matter. A client's image had been used without permission on a third party's website. When challenged, the user claimed an educational purposes exception, since it described itself as an educational institution. But the actual statutory educational exception is narrow, covering mainly use in the course of a lecture for literary works, and the image in question had simply been used to make an unrelated technical article visually appealing, which is neither criticism nor review of that or any other work, and so the exception did not apply. Separately, courts apply a rough rule of thumb that an event counts as “newsworthy” for the reporting-of-current-events exception only within about a 24-hour window.</p>\n<p>Courts also recognize a de minimis defense, excusing copying that is genuinely trivial, weighing factors like the size and type of harm caused, the cost of adjudicating the dispute, the purpose of the legal obligation supposedly violated, the effect on third-party rights, and the intent of the alleged infringer. The speaker's example involved a television advertisement educating consumers about MRP, or Maximum Retail Price, that briefly used about 10 seconds of a copyrighted song playing in the background of a shop scene. The court found the use so minimal that it could not meaningfully harm the copyright owner, particularly given the ad's educational, non-commercial purpose, and held it did not amount to infringement.</p>\n<h3 id=\"practical-tips-for-startups\">Practical tips for startups</h3>\n<p>Startups often focus their intellectual property attention entirely on patents, overlooking how much of their everyday output, website content, brochures, and artistic logos, is separately copyrightable and worth protecting alongside any trademark filing.</p>\n<p>A real client story makes the stakes concrete. An Italian client doing business in India shared a product brochure with a distributor at the distributor's request. The distributor then copied the brochure word for word and used it to launch a competing business. Because the original brochure carried no copyright notice or publication date, proving in court that the client had created it first, ahead of the distributor's copy, would have been genuinely difficult.</p>\n<p>The fix is simple and cheap: place a copyright notice, the © symbol, a year, and the owner's name, on websites, brochures, and any other literary or artistic work worth protecting. For content that keeps evolving, such as a website live since 2018 and still being updated in 2022, the notice can use a year range, extended with each new version, for example “© 2018 to 2022,” while physical, printed materials can simply carry the specific publication year of that fixed edition, since a printed copy does not change after the fact.</p>\n<p>Anyone operating a platform that hosts other people's content, described broadly as an intermediary, whether a sales marketplace or a music platform, needs to understand takedown obligations. Once an intermediary has actual knowledge of infringing content, typically through a proper report or court order, and fails to act, liability for that infringement can begin to attach to the intermediary itself.</p>\n<p>---</p>", "toc": [["What the Copyright Act actually protects", "what-the-copyright-act-actually-protects"], ["Who qualifies for protection", "who-qualifies-for-protection"], ["Setting the bar for originality", "setting-the-bar-for-originality"], ["Ideas versus their expression", "ideas-versus-their-expression"], ["Is registration mandatory?", "is-registration-mandatory"], ["Who owns a work, and the newspaper exception", "who-owns-a-work-and-the-newspaper-exception"], ["The economic case for copyright", "the-economic-case-for-copyright"], ["Assigning and licensing a copyright", "assigning-and-licensing-a-copyright"], ["How long protection lasts", "how-long-protection-lasts"], ["Moral rights and neighboring rights", "moral-rights-and-neighboring-rights"], ["What counts as infringement", "what-counts-as-infringement"], ["Remedies, fair dealing, and trivial copying", "remedies-fair-dealing-and-trivial-copying"], ["Practical tips for startups", "practical-tips-for-startups"]], "qa": [{"q": "How should a copyright notice be written for a website whose content keeps changing and growing over time?", "a": "<p>Use a year range rather than a single year. If a website launched in 2018 and it is now 2022, the notice would read something like “© 2018 to 2022, [owner name],” and the end year gets extended as each new version goes live, becoming 2023 the following year, and so on. The same approach works for product brochures that get revised over time. For a fixed, printed edition rather than an evolving digital work, a single specific publication year is enough, since a printed copy does not change after it is issued.</p>"}, {"q": "Can a startup copyright its own tagline or slogan?", "a": "<p>No, not on its own. A tagline or slogan is generally considered too short to meet the originality threshold copyright requires. One workaround is to pair the tagline with a substantial piece of original artwork and register that combination as an artistic work, but the tagline by itself remains outside copyright protection, even though it may separately qualify as a trademark.</p>"}, {"q": "Is a copyright registration certificate necessary in order to assign or license a copyright?", "a": "<p>No. As long as ownership can be shown, for example through a copyright notice and supporting evidence, an owner can assign or license their rights through a written agreement. That signed assignment or license agreement itself becomes the recipient's proof of title to that specific right, and the recipient can go on to further assign that right to someone else without the original work ever needing to be registered with the Copyright Office.</p>"}, {"q": "Is there a royalty concept in copyright, similar to patents?", "a": "<p>Yes. Royalties are the standard way copyright owners earn economic value from their work, whether per copy of a book sold, per view, or per subscription. J.K. Rowling's rise to billionaire status through book royalties is the example given of what this can add up to over time.</p>"}, {"q": "Can poetry posted on a personal social media page, such as Instagram, be protected?", "a": "<p>Yes, simply by placing a copyright notice on each post. This puts the public on notice that the work is proprietary, and supports taking action against anyone who copies it later, all without any need for formal registration.</p>"}, {"q": "Who owns the copyright in an article published in a scientific journal, the journal itself or the individual investigator who wrote it?", "a": "<p>The journal or publisher holds copyright in the article as part of the journal's collective work. The individual author, however, retains a separate right to republish that same article independently outside the journal, unless the author has specifically agreed otherwise with the publisher, for instance through a contract restricting standalone republication.</p>"}, {"q": "Follow-up: if a measurement scale or tool was developed by an original researcher and published as part of a journal article, does a later user need permission from the journal or from the original author to reuse that scale?", "a": "<p>The original researcher holds copyright in the article as its author, while the journal holds a separate collective-work copyright once the article is published there. Whether a later party needs permission depends on the specific rights involved and any agreement between the author and the journal, though the author is not barred from separately republishing their own underlying work unless they specifically agreed to a restriction with the publisher.</p>"}, {"q": "Why are music directors who copy melodies from more popular international releases rarely held liable, given that copyright applies globally under the Berne Convention?", "a": "<p>Liability is not actually absent as a legal matter; the copying frequently just goes undetected, since audiences may not recognize that a foreign work has been copied. When such copying is caught, liability does apply. As a contrasting example of doing it properly, the speaker points to Aamir Khan's Bollywood project, which obtained licensed remake rights from the producers of the Hollywood film Forrest Gump before proceeding.</p>"}, {"q": "Is there Indian case law specifically addressing software copyright?", "a": "<p>The speaker recalled one early case involving a dispute over custom dental-practice management software, where a developer's software idea was allegedly shared with and then copied by another party. The court's inquiry went beyond simply comparing literal source code and also examined whether the overall structure of the software had been copied. More broadly, the speaker noted that software copyright protection is inherently narrow, since copyright protects only the originality of the expression, meaning the specific way source code is written and arranged, not the underlying functional ideas or algorithms it implements.</p>"}, {"q": "If only a portion of the source code, such as the first and last 10 pages under the applicable filing rule, is submitted for copyright registration, how can infringement of the full code later be established?", "a": "<p>The registration process itself does not involve a technical review for originality, since the Copyright Office is not staffed to conduct that kind of comparison; the partial submission is mainly meant to create an official record of the work's existence and content at a given point in time. Establishing actual infringement later requires a technical expert to directly compare both full codebases. Many software owners remain reluctant to submit full source code for registration in the first place, out of concern about further exposing it to copying.</p>"}]}, "designs": {"title": "Only Designs! (Part 5 of Only One Theme: An Awareness Campaign on Innovation Management)", "shortTitle": "Designs", "speaker": "Ravi Bhola, Partner at K&S Partners", "role": "Chairs the patents practice at K&S Partners. Has filed and prosecuted patent applications across biotechnology, software, nanotechnology, pharmaceuticals, electronics, and mechanical technology. Also handles design licensing, assignment, oppositions, freedom to operate, and IP portfolio strategy. Certified Patent Valuation Analyst.", "overview": "A practical walkthrough of India's design registration system, the intellectual property right that protects how a product looks rather than how it works. It covers what qualifies, how fast and cheap Indian design registration really is, where it runs into limits like graphical user interfaces, and why a cheap design registration once became the legal weapon in the Apple versus Samsung mobile phone dispute.", "videoId": "dkBV5_HOqCM", "videoUrl": "https://www.youtube.com/watch?v=dkBV5_HOqCM", "duration": "1 hour", "readMin": 16, "articleMin": 10, "takeaways": "<p>If you make a physical product and want to know whether design registration is worth pursuing, this is what the talk covers.</p>\n<ul>\n<li>Design protection covers only the look and feel of an article, its shape, ornamentation, patterns, lines, and color combinations, completely independent of how the article functions. A chair's comfort is irrelevant; only its visual appearance is protected.</li>\n<li>India grants a design monopoly for 10 years, extendable by 5 more, and registration typically takes just 4 to 8 months, far faster and cheaper than in Europe or the US.</li>\n<li>A design does not need to be novel everywhere in the world if it is original, meaning it is a known design applied to a new kind of article for the first time, such as a bear-shaped bookshelf.</li>\n<li>India allows only one design variant per application, unlike Hague Agreement countries, so businesses that expect minor copycat variations should file separate applications for each variant, ideally on the same day.</li>\n<li>Purely functional features, like the cutting pattern of a key, cannot be design registered, and graphical user interfaces have been rejected in India for over a decade because a screen interface is not seen as the article itself taking that shape.</li>\n<li>A design registration costing under a thousand dollars became central to the Apple versus Samsung mobile phone litigation, showing that design rights can be a faster, cheaper enforcement tool than patents for products with short market cycles.</li>\n</ul>\n<p>---</p>", "summary": "<p><strong>What a design protects.</strong> Design registration protects only the aesthetic look of an article: its shape, configuration, ornamentation, patterns, lines, or color combination. It has nothing to do with functionality, so a chair's design registration covers how it looks, not whether it is comfortable to sit in.</p>\n<p><strong>Novelty or originality.</strong> An application succeeds if the design is novel, meaning unknown anywhere in the world, or original, meaning a known design applied to a particular article for the first time. A well-known bear shape applied for the first time to a bookshelf is not novel, since bears are widely known, but it is original in that application.</p>\n<p><strong>Registration in India.</strong> Applications are examined only through the Kolkata design office, regardless of where they are filed, since design filings are far fewer than patent or trademark filings. The process typically takes 4 to 8 months from filing to registration, aided by full digitalization, and government fees range from 1,000 rupees for an individual to 4,000 rupees for a large company. Registration lasts 10 years, extendable by 5 more.</p>\n<p><strong>Territorial limits.</strong> A design registered in India is protected only in India, and becomes visible worldwide once published in the design journal, meaning others outside India can freely use it unless separately registered there. India is not a member of the Hague Agreement, so businesses must file separately, country by country, to get protection abroad, using their first Indian filing date as a priority date for filings made within 6 months.</p>\n<p><strong>One variant per application.</strong> Unlike Hague member countries, India's Designs Act allows only one design variant in a single application. Businesses expecting a competitor to make small variations should file separate applications for each expected variant, ideally simultaneously, so one filing does not undercut the novelty of the other.</p>\n<p><strong>Enforcement without criminal remedy.</strong> Design infringement carries only civil remedies in India: injunctions and damages, with statutory upper limits on damages, but no imprisonment. Litigation volume is modest compared to trademarks and patents but appears regularly in High Courts like Delhi, Bombay, Madras, and Karnataka.</p>\n<p><strong>The Apple v. Samsung lesson.</strong> A handful of design registrations that would have cost less than a thousand dollars became central to one of the biggest technology disputes in the world, between Apple and Samsung over mobile phone appearance. For products with short market cycles, a design registration obtainable in months can let a company sue a copycat competitor faster than a patent, which can take one to three years to grant.</p>\n<p><strong>What cannot be registered.</strong> Obscene or scandalous designs are barred outright. Purely functional features, like the corrugated cutting pattern of a key, cannot be registered because that shape exists only to make the key work, not to look a certain way. Graphical user interfaces have faced consistent rejection in India since around 2010, on the reasoning that a screen interface is visible only when a device is powered on and the device itself does not take the shape of the interface.</p>\n<p>---</p>", "article": "<h3 id=\"design-as-a-distinct-kind-of-intellectual-property-protection\">Design as a distinct kind of intellectual property protection</h3>\n<p>A single innovative product can carry several different kinds of intellectual property protection at once. A robot, for example, might get patent protection for its underlying functionality, copyright for its source code, trademark protection for its branding, and design protection for how it looks. Design registration is exclusively about that last piece: the aesthetic look and feel of an article, entirely independent of its functionality.</p>\n<p>Design protection covers the shape of an article, its overall configuration, any ornamental elements, and the patterns, lines, or color combinations used to make it visually appealing to the eye. It has nothing to do with engineering design in the functional sense. A chair may involve real engineering to make it comfortable, but design registration protects only how the chair looks, regardless of how it feels to sit in. The same logic applies to automobiles, fans, and countless everyday products: they all have functionality, but design registration is concerned only with the first visual impression a buyer forms from a distance, before functionality even enters the picture.</p>\n<p>India's Designs Act governs what can be registered and grants a monopoly over that design, applied to that specific article, for 10 years from the filing date, extendable by another 5 years for a maximum of 15 years total.</p>\n<h3 id=\"what-the-law-requires-novelty-or-originality\">What the law requires: novelty or originality</h3>\n<p>Section 2(d) of the Designs Act defines a design as something applied onto an article, made through any industrial process, whether manual, mechanical, or chemical, such that the article itself takes the shape of the design. A single composite product can sometimes generate multiple separate design registrations if its individual components have their own independent visual appeal and are also bought and sold on their own as standalone commodities.</p>\n<p>An application must clear one of two tests. Novelty means the design must not be known anywhere in the world; it cannot already exist in the public domain. Originality is a separate and looser test: even if the design itself is already known, applying it to a particular kind of article for the very first time can still qualify. The speaker's example is a design shaped like a bear, applied for the first time onto a bookshelf or file rack. The bear shape itself is not novel, since bears are a widely known form, but applying that familiar shape onto a bookshelf for the first time makes the resulting design original, and therefore registrable.</p>\n<h3 id=\"how-registration-works-in-india\">How registration works in India</h3>\n<p>India's design registration process has become notably fast and streamlined. On average, an application takes about 4 to 6 months from filing to registration, and the entire process, from filing through registration and later maintenance, is now digitalized.</p>\n<p>Structurally, an applicant can file at any of India's four patent, trademark, and design offices, but every design application, regardless of where it is filed, is examined by a single office in Kolkata. This works because design filings are far lower in volume than patent or trademark filings, which each receive three to five lakh applications a year, so a small team of two or three examiners and controllers in Kolkata can handle the entire country's design caseload.</p>\n<p>Applications are reviewed in the sequential order they were filed. Some well-prepared applications are granted directly without any objection. Others receive a First Examination Report raising issues, such as an unclear representation sheet or a conflicting prior design that undermines novelty or originality. The applicant then has 6 months to respond, extendable by another 3 months if needed. If the objections are resolved, the design proceeds to registration and publication. If they are not, the applicant receives a hearing notice, which can be conducted remotely or, for higher-stakes cases, in person, to argue the case directly with the controller. Outright rejection after a hearing is rare, occurring in roughly 1 out of every 500 to 1,000 cases, and even then the applicant can appeal the controller's decision to the High Court.</p>\n<p>Government filing fees vary by applicant type: 1,000 rupees for an individual, 2,000 rupees for an MSME, and 4,000 rupees for a large company. Extension requests for the additional 5-year term must be filed before the initial 10-year term expires.</p>\n<h3 id=\"protection-stops-at-india-s-border\">Protection stops at India's border</h3>\n<p>A design registered in India is protected only within India. Once the design is published in the official design journal, which happens as part of the registration process, it becomes publicly visible worldwide, and anyone outside India is free to use it, since the Indian registration gives no rights beyond India's borders.</p>\n<p>Businesses with interests in other countries need to separately file design applications in each of those countries. India is not a member of the Hague Agreement, the international system that lets an applicant cover many countries through a single filing, similar to how a single European patent application can cover dozens of countries. At the time of the talk, the Hague Agreement had 66 Contracting States, including most major developed IP markets: the United States, Canada, the United Kingdom, much of Europe, South Korea, Japan, and China. There had been discussion of India eventually joining, which would make it far easier to seek design protection abroad through one filing, but as things stood, applicants had to file individually, country by country. The first filing date, wherever it is made, becomes a priority date, and applicants generally aim to file in other countries of interest within 6 months of that first filing.</p>\n<p>Filed applications must also be classified using the Locarno Classification, an internationally recognized system for categorizing articles by class and subclass, such as a class for utensils with further subclasses within it. Since the resulting monopoly is scoped specifically to the class and subclass identified, applicants need to be careful about correctly identifying every class their article might fall under.</p>\n<h3 id=\"the-one-variant-limitation-and-how-enforcement-partly-offsets-it\">The one-variant limitation, and how enforcement partly offsets it</h3>\n<p>One notable limitation in India is that a single design application can cover only one design variant. In some other jurisdictions, including parts of Europe, a single application can cover slight variations of the same underlying design, for instance a version of an article with a sharp edge alongside a version with a softer, more rounded edge. India does not allow this. Each variant requires its own, separate design application.</p>\n<p>This creates a practical filing strategy question: if a business anticipates that a competitor might introduce only slightly modified copies, it is advisable to file separate applications for each anticipated variant, ideally simultaneously, using the same applicant, so that one filing does not become prior art that undermines the novelty or originality of another filed shortly after.</p>\n<p>Indian courts have partly softened this limitation at the enforcement stage. There is a meaningful body of case law showing that when a court finds an infringer made only an insignificant change to a registered design, specifically to try to sidestep infringement, courts have taken a broad view of the registered design's scope and issued injunctions or other adverse orders against the infringer anyway. Still, the speaker was clear that this enforcement flexibility is not a substitute for properly registering each meaningful variant up front. Relying on courts to stretch the scope of one registration is a weaker position than holding separate registrations for each variant.</p>\n<h3 id=\"value-in-the-market-the-apple-v-samsung-example\">Value in the market: the Apple v. Samsung example</h3>\n<p>Design rights can carry outsized value relative to their cost. The Apple versus Samsung dispute over mobile phone displays, which ran for years, is the speaker's central example. Both companies filed enormous numbers of patents, and most observers expected any major dispute between them to center on patents in the telecom space. Instead, a handful of relatively simple design registrations covering the phones' visual appearance, registrations that would have cost less than a thousand dollars to obtain, became a hugely powerful legal weapon in the case.</p>\n<p>This illustrates a broader strategic point: in industries where a product's market cycle is short, say 2 to 3 years, obtaining a full patent might take around a year even on a startup fast track, or up to 3 years for a larger company, while a design registration can be secured in as little as 6 months. Filing patent and design applications simultaneously lets a company hold a design registration in hand quickly. Since infringement action requires an already-granted right, having that design registration secured early lets a company go after a copycat competitor for infringement well before any corresponding patent would have been granted.</p>\n<h3 id=\"what-cannot-be-registered\">What cannot be registered</h3>\n<p>Certain categories are barred from design registration regardless of appearance. Anything obscene or scandalous does not qualify. Purely functional features are also excluded: the corrugated cutting pattern on a key, for instance, exists solely to let the key operate a specific lock, so that particular feature cannot get design registration, since its form is dictated entirely by function rather than appearance. An article that combines both functional and aesthetic elements, which describes most real products, can still be registered, as long as the application and its claims focus only on the visual, aesthetic aspects and not on the functional ones.</p>\n<p>Graphical user interfaces (GUIs) are a genuinely unresolved area. Many countries allow GUI designs to be registered, and even the Locarno Classification system that India uses technically includes categories for GUIs. Despite this, India's Design Office has consistently rejected GUI design applications since around 2010, even though a handful of Microsoft GUI registrations were granted before that year, and this rejection pattern had persisted for about 12 years as of the talk. The Design Office's reasoning rests on the wording of Section 2(d): a registrable design must be applied onto an article such that the article itself takes the shape of the design, but a GUI is visible only when a device is powered on, not at all times, and the device, such as a mobile phone, does not itself take the shape of the interface, unlike, for example, a paperweight whose entire shape is the design being registered. The speaker personally disagrees with this reasoning and expects it to eventually change, but as of the talk, GUI applications continued to be rejected on this basis.</p>\n<h3 id=\"enforcement-and-where-design-litigation-shows-up\">Enforcement and where design litigation shows up</h3>\n<p>Design rights carry only civil remedies in India, not criminal ones, meaning an infringer cannot be sent to prison over a design dispute. Available remedies are injunctions to stop the infringing use and damages, with statutory upper limits prescribed for those damages. Cases are typically filed at the district court level, with an appeal route available to the High Court. Design litigation volume in India is modest compared to trademark disputes, which are more common, and patent disputes, but design cases do appear with some regularity in High Courts including Delhi, Bombay, Madras, and Karnataka.</p>\n<h3 id=\"filing-strategy-and-application-mechanics\">Filing strategy and application mechanics</h3>\n<p>A few practical habits strengthen a design filing strategy. It can be worth registering obvious variations of a design to pre-empt a competitor introducing only minor changes. When a composite article has individual components with independent commercial value, such as a cricket kit whose pieces might be sold separately, those components can be separately registered as well. And because an article's look and its function are legally separate, the same product may also qualify for patent protection, making a combined, multi-layered filing strategy worth considering from the start, as the Apple v. Samsung example shows.</p>\n<p>A design application requires representation sheets showing the article from multiple angles: perspective, front, rear, side, top, and bottom views, so the examiner can clearly see the full appearance being claimed. Where a product's novelty rests on the whole article, the novelty statement can cover the entire design; where the novel feature is only part of an otherwise known article, for instance a modified centrifuge tube that differs from existing tubes in just one part, the novelty statement and representation sheets can instead focus specifically on that particular feature, rather than claiming the whole device. Any disclaimer covering text, letters, numbers, or dimensions shown on the sheets is typically excluded from the scope of protection.</p>\n<p>Filing volume trends show the system's growth: over roughly the five years before the talk, annual design application filings rose from about 11,000 to more than 14,000, and annual examinations rose from about 7,000 to as many as 13,500, with overall registrations and total disposals rising in step and little to no backlog. By contrast, registration in Europe or the US typically takes a year or more and costs substantially more.</p>\n<p>---</p>", "toc": [["Design as a distinct kind of intellectual property protection", "design-as-a-distinct-kind-of-intellectual-property-protection"], ["What the law requires: novelty or originality", "what-the-law-requires-novelty-or-originality"], ["How registration works in India", "how-registration-works-in-india"], ["Protection stops at India's border", "protection-stops-at-india-s-border"], ["The one-variant limitation, and how enforcement partly offsets it", "the-one-variant-limitation-and-how-enforcement-partly-offsets-it"], ["Value in the market: the Apple v. Samsung example", "value-in-the-market-the-apple-v-samsung-example"], ["What cannot be registered", "what-cannot-be-registered"], ["Enforcement and where design litigation shows up", "enforcement-and-where-design-litigation-shows-up"], ["Filing strategy and application mechanics", "filing-strategy-and-application-mechanics"]], "qa": [{"q": "If the same applicant is filing multiple variants of a design, will the controller allow the minor variations to register separately?", "a": "<p>Yes, but the applications should be filed simultaneously so that one filing does not later become a priority obstacle for the other. Since a small team of examiners in Kolkata reviews all design filings, related applications from the same applicant often reach the same examiner, who will notice the similarity. The applicant then needs to clearly argue where the novelty of each variant lies relative to the others, but doing this is entirely workable and commonly done.</p>"}, {"q": "For a design where a feature, like a camouflaged cover on a box, is visible only on close inspection, is it acceptable to submit a zoomed-in view of just that feature rather than the full overall appearance?", "a": "<p>Yes. A zoomed-in view is acceptable as long as the representation sheet clearly states that it is a zoomed-in view of that specific part. The Design Office very rarely insists on the physical article being shown in person, though that option remains available in rare cases if needed to convince the examiner.</p>"}, {"q": "Will a previously published design from the same owner cause a problem for a later-filed variant?", "a": "<p>Ideally, related variants should be filed at the same time. If that is not possible and an earlier design is already registered and published before a related, slightly different design is filed, the examiner may cite the earlier registration against the newer one on grounds that it is not novel or original. In that situation, the applicant's option is to narrow the later application specifically to the differentiated feature, marking it clearly with an arrow in the representation sheet to show exactly where the novelty lies, which will generally let that narrower variant proceed to registration.</p>"}, {"q": "Is a common design made using a newly engineered material a protectable design?", "a": "<p>Generally, no, not on the basis of the material alone. The type of material used and its underlying dimensions are usually not relevant considerations from a design perspective, since design protection concerns appearance, not composition. A change in material would more likely be relevant to patent protection instead, unless the different material genuinely changes the visual look and feel of the article in a way that itself becomes the novel design element.</p>"}, {"q": "Does design protection cover only the parts of a product visible on its surface, or can it extend to internal, non-functional components as well?", "a": "<p>Design registration in a single application generally covers only the externally visible appearance of a product as it is normally sold or traded. For a product like a wallet, the closed, external form would be covered by one application, while the open form showing the internal pocket arrangement would need a separate registration specifically for that open-view appearance. Even in that second application, only the visual, aesthetic aspect of the interior is protected, never any functional element of it.</p>"}, {"q": "When filing both a patent and a design application for the same article, is there a risk that the patent drawings will show the assembled, aesthetic appearance meant to be reserved for the design filing?", "a": "<p>The safest approach is to file both applications simultaneously, or at least very close together, just as with multiple design variants. In practice, the two filings usually look quite different anyway, since patent drawings tend to focus on functional and technical views of the device, while design representation sheets focus on front, rear, side, top, and bottom appearance views. Some overlap between the two sets of images is not a problem, but filing them close together remains the recommended precaution.</p>"}]}, "geographical-indications": {"title": "Only Geographical Indications! (Talk 9 of \"Only One Theme\", Wave 3)", "shortTitle": "Geographical Indications", "speaker": "Prof. Ganesh Hingmire", "role": "IP expert focused on geographical indications. Winner of two consecutive National IP Awards (2015 and 2016). Founder of Great Mission Group Consultancy. Has worked on 95 GIs, of which more than 63 are registered.", "overview": "India has registered fewer than 1,000 geographical indications in over two decades. The European Union has about 60,000. This talk explains what a GI is, why that gap exists, and how a product tied to a place, like Mahabaleshwar strawberry or Puneri Pagdi, becomes protected income for a whole community.", "videoId": "NNDHMMExmJM", "videoUrl": "https://www.youtube.com/watch?v=NNDHMMExmJM", "duration": "1 hour 16 min", "readMin": 14, "articleMin": 8, "takeaways": "<p>If you grow or make something tied to a particular place, or you want to help a rural community protect what it produces, this is what a geographical indication can do.</p>\n<ul>\n<li>A GI is a community's intellectual property. It protects a product whose quality or reputation comes from where it is made, such as Darjeeling tea, Mahabaleshwar strawberry, or Scotch whisky.</li>\n<li>Only a community can hold a GI, through an association, not a single person. The payoff is a premium price and a stronger rural economy.</li>\n<li>India has registered fewer than 1,000 GIs in over 20 years. The European Union has about 60,000, and China has more than 9,700 in force. The gap is mostly awareness and documentation.</li>\n<li>A GI application needs three things: a clear link to the place, historical evidence, and scientific support for what makes the product unique.</li>\n<li>The law sorts GIs into three types: agricultural, natural, and manufactured, which covers textiles and handicrafts.</li>\n<li>A GI gives legal protection at home, and through the WTO's TRIPS agreement, a route to protection abroad. Darjeeling has fought 16 cases against fake use.</li>\n</ul>\n<p>---</p>", "summary": "<p><strong>What a GI is.</strong> A geographical indication protects a product whose quality, reputation, or character comes from where it is made. Ganesh Hingmire calls it a community's intellectual property, and “our forefathers' patent”, because a community found the right place for a product, grew or made it, and built its reputation over generations.</p>\n<p><strong>The three requirements.</strong> To earn a GI, a product needs a link to its place, historical evidence that it has been made there for a long time, and scientific support for what makes it special. Mahabaleshwar strawberry qualified on all three, with its hill-station soil, its long history, and 200 seeds outside the fruit against 160 elsewhere.</p>\n<p><strong>The three categories.</strong> The Act sorts GIs into agricultural goods such as strawberry, natural goods such as Makrana marble, and manufactured goods such as Paithani sarees and the Puneri Pagdi head gear. India has registered only two natural GIs so far.</p>\n<p><strong>Why India lags.</strong> After more than 20 years, India has not crossed 1,000 GIs, and fewer than 600 are Indian. The European Union has about 60,000 and China more than 9,700 in force. The reasons are lack of awareness and the effort of gathering historical and scientific evidence, both of which can be fixed.</p>\n<p><strong>What a GI does for a community.</strong> A GI raises the price and strengthens the rural economy. After Mahabaleshwar strawberry got its GI and a yearly festival, agro-tourism grew and India Today reported that 54 families moved back to the town to farm strawberry.</p>\n<p><strong>Legal protection and the WTO.</strong> A GI stops others outside the region from using the name, so a grower in Solapur cannot sell “Mahabaleshwar strawberry”. India passed the GI law because of the WTO's TRIPS agreement, which gives Indian GIs a route to protection in other member countries, and lets foreign GIs like Scotch whisky enforce their rights here.</p>\n<p><strong>India's untapped GIs.</strong> Many unique Indian products, such as tribal textiles from Bodoland and seven local alcoholic beverages, remain unregistered. Some Indian drinks sell for around 50 rupees while a GI-protected tequila, Scotch, or champagne sells for thousands.</p>\n<p><strong>The registration process.</strong> You file with the GI Registry in Chennai, reply to a formality check within two months, face a consultative group of experts, and if accepted, the application is published and you get a certificate. It takes six months to three years.</p>\n<p><strong>Q&amp;A.</strong> The GI logo, protecting a GI in other countries, the hard work of forming an association, and the career opportunity in a country with room for 10,000 GIs.</p>\n<p>---</p>", "article": "<h3 id=\"what-a-geographical-indication-really-is\">What a geographical indication really is</h3>\n<p>A geographical indication, or GI, protects a product whose quality or reputation comes from the place it is made. Darjeeling tea, Mahabaleshwar strawberry, and Scotch whisky are all GIs. The product is tied to its region, it is unique, and that link earns it legal protection.</p>\n<p>Ganesh Hingmire describes a GI as a community's intellectual property, and in plain terms as “our forefathers' patent”. Long ago a community found a place where they could grow or make something exceptional. They produced it, it became famous, and it built a lasting identity in the market. The GI recognizes that link between the product and the place.</p>\n<p>This makes a GI different from other intellectual property. A patent or a trademark belongs to a company or a person. A GI belongs to a community, and only a community can hold one, through an association. That can be a group of farmers, artisans, or weavers who use a shared skill to make a unique product.</p>\n<h3 id=\"the-three-things-a-product-needs-to-earn-a-gi\">The three things a product needs to earn a GI</h3>\n<p>A GI application rests on three kinds of proof. The product needs a clear link to its geography. It needs historical evidence that it has been made in that place for a long time. And it needs scientific support for what makes it unique.</p>\n<p>Mahabaleshwar strawberry is a good worked example, because Hingmire registered it in 2009 and it is India's highest-selling agricultural GI.</p>\n<h4>The strawberry, point by point</h4>\n<p>Start with geography. Mahabaleshwar is a hill station with red laterite soil and heavy rainfall. Those conditions led earlier generations to grow strawberry there, and the crop became famous.</p>\n<p>Then uniqueness, shown by comparison. A Mahabaleshwar strawberry has about 200 seeds on the outside of the fruit, against about 160 elsewhere, which means roughly 20 percent more nutritional value. The laterite soil gives it more iron. The heavy rainfall makes it juicier.</p>\n<p>Those are the points the application captured, and they won the GI. In short, if you have a unique agricultural product from a particular place, you can seek a GI by showing five things: the geography, the uniqueness, the environment, the natural advantage such as soil, and the skill of the community that makes it.</p>\n<h3 id=\"the-three-categories-of-gi\">The three categories of GI</h3>\n<p>The Geographical Indications of Goods Act sorts GIs into three types.</p>\n<h4>Agricultural goods</h4>\n<p>These are grown products, and they include horticulture. Mahabaleshwar strawberry is one. Most major GIs come from rural areas, which is why a GI matters so much for the rural economy.</p>\n<h4>Natural goods</h4>\n<p>These are products whose uniqueness comes straight from nature. Makrana marble from Rajasthan is one. It holds more than 98 percent calcium carbonate, so it shines naturally, and it was used for hundreds of years in the Taj Mahal, and later by the British. India has registered only two natural GIs so far. Hingmire is also working on Gomukh Ganga jal, the water from Gomukh, which carries about 25 times more dissolved oxygen and a high count of natural bacteriophages.</p>\n<h4>Manufactured goods</h4>\n<p>These are made products, and they include textiles and handicrafts. Paithani, Banarasi, and Chanderi sarees are GIs, as is the Pashmina shawl from Kashmir. So is the Puneri Pagdi, a traditional head gear, which was the first GI Hingmire registered, in 2007. For that one he collected evidence going back hundreds of years, including its use by Lokmanya Tilak and by freedom fighters.</p>\n<h3 id=\"why-india-has-so-few-gis\">Why India has so few GIs</h3>\n<p>Here the talk turns to scale, and the numbers are stark.</p>\n<p>After more than 20 years with a GI law, India has not yet crossed 1,000 registrations. About 643 GIs are registered in total, and fewer than 600 of those are Indian. The rest are foreign GIs registered in India.</p>\n<p>Compare that with other places. The European Union has about 60,000 registered GIs. China has more than 11,000 applied and over 9,700 in force. Even the UK has more than 5,000.</p>\n<p>The reasons India lags are lack of awareness and the work of gathering evidence, both the historical record and the scientific support for a product's uniqueness. Hingmire argues that neither is a real barrier now, because incubation centres and labs can help, if they turn their attention to GIs.</p>\n<p>In the European Union, wine and spirits make up about 48 percent of GI registrations and agricultural products about 44 percent, with far fewer handicrafts. India has the opposite strength, a wealth of handicrafts, which mostly sit unregistered.</p>\n<h3 id=\"what-a-gi-does-for-a-community\">What a GI does for a community</h3>\n<p>A GI is not just a certificate. It changes the economics of a place.</p>\n<p>A GI raises the price of the product and strengthens the rural economy, which improves the livelihoods of the farmers or artisans who make it. Because most GIs come from rural areas, this is where the effect lands.</p>\n<h4>The strawberry festival and re-migration</h4>\n<p>After the strawberry got its GI, Hingmire's team started a Strawberry Mahotsav in 2011, held each year from Good Friday. The idea is simple. Tourists are invited to come and eat fresh strawberry, they stay two or three days, and on the way home they buy several kilograms for family and friends.</p>\n<p>The deeper result is economic. India Today reported that 54 families moved back to Mahabaleshwar to grow strawberry after the GI. In a country worried about people leaving villages for cities, a GI helped pull families back. That is why Hingmire calls a GI not just intellectual property but a tool for prosperity.</p>\n<p>Other cases echo this. A banana from a small village won a 12 crore export order after its GI, which the Press Information Bureau covered. Gholvad chiku from Dahanu, first cultivated there in 1888, led young entrepreneurs to make chiku powder, chiku chips, and even chiku wine sold from a chiku parlour. Kesar mango from a region with high farmer distress earned export orders, and in one year the farmers kept the crop for the home market because the domestic price was better.</p>\n<h3 id=\"the-legal-protection-and-how-it-reaches-abroad\">The legal protection, and how it reaches abroad</h3>\n<p>Once a product has a GI, others outside the region cannot use its name. A grower in Solapur cannot label their fruit “Mahabaleshwar strawberry”. The GI restricts unauthorized use, and it protects the identity of grapes from Nashik, custard apple from Beed, or sarees from Banaras.</p>\n<h4>Why the protection crosses borders</h4>\n<p>India passed its GI law because of the TRIPS agreement of the World Trade Organization. TRIPS is the WTO's agreement on trade-related intellectual property, and it has three articles on GIs. The WTO has 166 members, and members are committed to its rules.</p>\n<p>Because India enacted the law under TRIPS, Indian GIs have a route to protection in other member countries. The same route lets foreign GIs enforce their rights in India. No one can make Scotch whisky in India, and when someone tried in Maharashtra, the Scotch Whisky Association filed a case and stopped it.</p>\n<h4>Protection is worthless without registration</h4>\n<p>Enforcement only works if you have registered the GI. Darjeeling has fought 16 cases against fake use. Nepal sold cheap tea as Darjeeling until action was taken. Banarasi sarees face a similar problem with sarees made elsewhere and sold under the name. In each case the registered GI is what makes enforcement possible.</p>\n<p>The customer benefits too. More than 80 percent of buyers cannot tell a genuine place-based product from a copy. A GI, with its logo, tells the buyer which product is real, and lets the community act against fakes. After its GI, Darjeeling tea reached more than 60 countries, which also earns the country foreign exchange.</p>\n<h3 id=\"india-s-untapped-gis\">India's untapped GIs</h3>\n<p>The talk's strongest argument is about what India is leaving on the table.</p>\n<p>Take alcoholic beverages. Everyone knows champagne and Scotch, but India has many unique local drinks that could be GIs. Hingmire has worked on seven, such as Sur and Chhang, made by indigenous communities. On a price comparison, an Indian drink might sell for around 50 rupees while a GI-protected tequila, Scotch, or champagne sells for thousands. The Indian products are untapped and unrecognized, not inferior. As historical support for this work, his team drew on the Charak Samhita, which says that alcohol used appropriately is like nectar and misused is poison.</p>\n<p>Tribal products tell the same story. In Bodoland, Hingmire worked on 21 GIs, including five musical instruments, textiles such as Eri silk, which can last 170 years, and a fermented fish that keeps for three years without any preservative. These are unique products that most Indians have never heard of.</p>\n<h3 id=\"how-registration-actually-works\">How registration actually works</h3>\n<p>The process is technical but not mysterious.</p>\n<p>You file an application with the GI Registry in Chennai. The Registry issues a formality check report, which you must answer within two months. Then a consultative group meets, chaired by the Registrar, with no more than seven domain experts, and it examines your statement of case. If the product passes, the application is published and you receive a registration certificate. The whole process takes six months to two years, sometimes three, depending on how complex the case is.</p>\n<p>The Registrar of GIs is in fact the Controller of Patents, and an Assistant or Deputy Registrar runs the GI Registry in Chennai.</p>\n<h3 id=\"what-india-still-needs-to-do\">What India still needs to do</h3>\n<p>Hingmire ends on the size of the opportunity and the work left.</p>\n<p>He estimates India could register 10,000 GIs, against the 600 or so it has now. The national GI policy has set an initial target of 5,000. He urges people to start a “GI Drive”, the way patent drives already run. After one such drive at IIT Kanpur, Rasagola from Odisha went on to get its GI.</p>\n<p>Registration alone is not enough, so his mission now pushes the next steps. Governments have started buying GI products, and a Maharashtra agency began procuring 11 registered GI products, including Navapur tur dal and jaggery. He has written articles and a Marathi book, GI Manangan, to reach the farming communities who are the real beneficiaries. His organization has run sessions in 29 states and worked in nine, and he argues that incubation centres and research labs should now step in with testing and scientific support, so that genuine products can be authenticated and fakes controlled.</p>\n<p>---</p>", "toc": [["What a geographical indication really is", "what-a-geographical-indication-really-is"], ["The three things a product needs to earn a GI", "the-three-things-a-product-needs-to-earn-a-gi"], ["The three categories of GI", "the-three-categories-of-gi"], ["Why India has so few GIs", "why-india-has-so-few-gis"], ["What a GI does for a community", "what-a-gi-does-for-a-community"], ["The legal protection, and how it reaches abroad", "the-legal-protection-and-how-it-reaches-abroad"], ["India's untapped GIs", "india-s-untapped-gis"], ["How registration actually works", "how-registration-actually-works"], ["What India still needs to do", "what-india-still-needs-to-do"]], "qa": [{"q": "How does a GI appear on a product, and are there norms for the label?", "a": "<p>The Government of India introduced a GI logo that you can use once your product is registered. On top of that, each product registers its own logo when it files, the way Darjeeling tea has its own mark that belongs to the Darjeeling association. The association of producers registers the logo, and buyers use it to identify the genuine product.</p>"}, {"q": "How do you protect a GI in countries other than India, and is Indian priority honoured?", "a": "<p>The first requirement is registration in your own country. Once you have the Indian GI, you can seek protection abroad through the available routes. In the European Union that is a Protected Geographical Indication, or PGI, and in the US it is a certification mark. So far only Darjeeling and Kangra have received a PGI. Basmati was applied for, but Pakistan applied too, so the issue is unresolved.</p>\n<p>The route runs both ways. Champagne, Scotch whisky, and feta cheese hold Indian status, and because India registered them, they can enter and enforce here, just as Indian GIs can enter their markets. This works through the TRIPS agreement. A Lisbon Agreement also exists for international GI protection, but India is not a member.</p>"}, {"q": "The hardest part seems to be forming the association. How do you handle the conflicts?", "a": "<p>It is a real challenge, and it needs field work, not just paperwork. An association of persons applies, and there are two kinds of registration. Part A is for the registered proprietor. Part B is for authorized users, and it is equal to Part A. So if one organization registers first, other genuine producers in the region are not shut out. They can later apply for Part B.</p>\n<p>The applicant needs a legal form, such as a society, a trust, a cooperative, a farmer producer organization, or an ATMA registration under the government's agriculture scheme. Historically about 60 percent of applications were filed by government bodies, such as Darjeeling by the Tea Board and Basmati by APEDA. That policy has changed, and now only the actual producers can file.</p>"}, {"q": "Is there a real economy and a career in GI work?", "a": "<p>Yes, and a large one. India has room for about 10,000 GIs and has registered only around 500 to 600, so roughly 9,500 remain. That is work for anyone willing to go to the field, draft applications, and contribute to the rural economy. Government bodies such as the MSME ministry and NABARD support the process, along with World Bank projects and the UN's sustainable development goals.</p>\n<p>Field work is essential, because secondary data alone does not carry an application. In one case, counting the age of old Alphonso trees on the ground gave the evidence the application needed. Funding can come through MSME and IPFC schemes, NABARD, or a proposal to the District Collector. Hingmire describes the work as being “professionally equipped and emotionally involved”.</p>"}, {"q": "We have found a unique new grape variety in Kashmir. Can it get a GI?", "a": "<p>Not if it is recently developed. A GI needs history behind it, on the order of 50 to 100 years. Saffron from Kashmir, for example, comes from a variety around 600 years old, so it qualifies. A product without that history will not get a GI, however unique it is today.</p>"}, {"q": "For Phulkari in Punjab, can a self-help group or NGO be an authorized user, or only individuals?", "a": "<p>Both individuals and groups can become authorized users, alone or together. But it is often better to file individual applications. They cost less, and they protect the group. One of the GI's key particulars is the method of production, and if one member of a shared registration fails to follow the standard method, the whole group is affected. An NOC from the proprietor is not required now, and an affidavit is not required either. If your facilitating department gives an NOC, that serves the purpose, otherwise the Registry hears the applicant directly.</p>"}]}, "patents": {"title": "Only Patents! (Part 1 of \"Only One Theme: An Awareness Campaign on Innovation Management\")", "shortTitle": "Patents", "speaker": "Ravi Bhola, Partner at K&S Partners", "role": "IP practi
