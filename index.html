tioner for over two decades, focused on patents and designs. Certified Patent Valuation Analyst. Works with and mentors startups.", "overview": "A founder's guide to patents in India. What a patent really is, what India will and will not let you patent, and ten practical decisions that decide whether your patent is worth anything. It starts with the mistake most founders make, which is filing too late.", "videoId": "Wt4MJ18qJgU", "videoUrl": "https://www.youtube.com/watch?v=Wt4MJ18qJgU", "duration": "1 hour 13 min", "readMin": 16, "articleMin": 10, "takeaways": "<p>If you are a founder or researcher about to file your first patent, this is the short version of what an IP lawyer would tell you first.</p>\n<ul>\n<li>A patent is a 20 year monopoly, granted country by country. An Indian patent stops others only in India, so you file where your market is, not where your lab is.</li>\n<li>To be patentable anywhere, an invention must be new to the whole world, non-obvious, and useful. Newness is judged globally even when you file only in India.</li>\n<li>File before you sell, market, or publish. Your own public disclosure destroys your novelty, and investors will ask whether you even own a barrier to being copied.</li>\n<li>India will not patent methods of treatment, diagnosis, surgery, farming methods, or higher life forms. It will patent devices, drugs, formulations, and software that is framed as a technical solution to a technical problem.</li>\n<li>You do not automatically own what your team invents. Employment, contractor, and intern agreements must assign inventions to you, and only real contributors should be named as inventors.</li>\n<li>Aim for eight to ten strong patents, not a large portfolio. Use the Paris Convention and the PCT to reserve rights in other countries while you defer the cost.</li>\n</ul>\n<p>---</p>", "summary": "<p><strong>What a patent is.</strong> A patent is a monopoly the state grants you over an invention in science or technology, for 20 years from the date you file. Rights stop at each country's border, so an Indian patent protects you only in India, and you file in the countries where you make or sell.</p>\n<p><strong>Timelines, and the startup fast track.</strong> Grant usually takes three to four years, in India and worldwide. An Indian startup can fast-track this to about a year or less, so file under the startup category if you qualify. You qualify if your company is under ten years old, never crossed ₹100 crore in turnover in any year, is not a spin-off from a large company, and is focused on innovation.</p>\n<p><strong>The three tests.</strong> An invention must be new to the whole world, must involve a genuine surprise rather than an obvious step, and must have some use. Inventive step is the subjective one. Shrinking a particle to raise its bioavailability may be called obvious, but shrinking it and getting fluorescence, which no known principle predicts, is a much stronger case.</p>\n<p><strong>What India will not patent.</strong> India will not patent methods of treatment, diagnosis, or surgery. It will not patent farming methods or higher life forms such as plants and animals. Recombinant microbes are patentable, because you added human intervention, while a naturally occurring microbe counts as a discovery.</p>\n<p><strong>The ten pointers for founders.</strong></p>\n<ol>\n<li>Timing: file before you disclose, sell, or market, because your own disclosure destroys your novelty and leaves you nothing to show investors.</li>\n<li>Ownership: you do not automatically own what your team creates, so agreements with employees, contractors, and interns must assign inventions to the company.</li>\n<li>Inventorship: name only the people who contributed intellectually, because over-naming creates legal and admin burden, and in Germany inventors must share in the profits.</li>\n<li>Disclosure: give enough that a skilled person can work the invention, but not so much that you hand competitors your trade secrets.</li>\n<li>Layering: combine patents, designs, copyright, and trademarks, and remember one device can hold several patents, so protection survives if one is knocked out.</li>\n<li>Markets: file where you will make and sell, and use the Paris Convention (1 year) and the PCT (2.5 years) to reserve rights abroad while you defer the cost.</li>\n<li>Searches: run cheap patentability searches early on many ideas, and a freedom to operate check once a product gains traction, to see whether you risk being sued.</li>\n<li>Quality: aim for eight to ten strong patents rather than a large portfolio that costs money but earns nothing.</li>\n<li>Regional routes: single applications can cover whole regions, such as more than 40 countries in Europe, or two filings for most of Africa.</li>\n<li>Litigation: patent litigation is rising in India, and over 2010 to 2020 the top ten litigators were all pharma.</li>\n</ol>\n<p><strong>Q&amp;A.</strong> The talk closes with traditional knowledge and the turmeric case, software and algorithms, monoclonal antibodies, and how many ideas one application can hold.</p>\n<p>---</p>", "article": "<h3 id=\"what-you-are-really-getting-when-you-get-a-patent\">What you are really getting when you get a patent</h3>\n<p>A patent is a legal mechanism that lets you monopolize an invention. The state grants it to you because you developed something of value in science or technology. That is broader than it sounds. If you invent a cheaper or unusual way to manufacture an existing product, the process itself can be patentable, not just the product.</p>\n<h4>Twenty years, and only where you file</h4>\n<p>Two features shape everything else. A patent lasts twenty years from the date you file. It is also a right that stops at each country's border.</p>\n<p>If you hold an Indian patent, you can stop others only in India. You cannot use it against a competitor in a neighboring country or anywhere else.</p>\n<p>So the real question is not whether to get a patent, but in which countries. If you manufacture in India, an Indian patent helps you. If your market is the United States, you need a US patent to hold a monopoly there.</p>\n<h4>How long it takes, and the startup fast track</h4>\n<p>Getting to grant usually takes three to four years. That is the pattern worldwide, not an Indian delay.</p>\n<p>There is one important exception for founders. An Indian startup can fast-track a patent and often get it in about a year, sometimes less. You should file under the startup category if you qualify.</p>\n<p>In India you qualify if your company is under ten years old, never crossed ₹100 crore in turnover in any year, is not a spin-off from a large company, and is focused on innovation.</p>\n<h3 id=\"the-three-tests-every-invention-must-pass\">The three tests every invention must pass</h3>\n<p>Anywhere in the world, an invention has to clear three bars before it can become a patent.</p>\n<h4>First test: new everywhere</h4>\n<p>The invention must be new, and newness is judged globally. This trips people up. Even if you file only in India, your invention has to be new against everything, everywhere. You cannot argue that newness should be checked only within India because you file only there. If someone already did it in the US, it is not new.</p>\n<h4>Second test: a genuine surprise</h4>\n<p>The invention must involve an inventive step, also called non-obviousness. The test is whether there is a surprise. Is the result unexpected, or does the method take a turn that a skilled person would not have predicted? This is the most subjective of the three, and it is worth seeing why.</p>\n<p>Take an example from nanotechnology. You are the first in the world to shrink a particle to nano size, and doing so raises its bioavailability. Is that patentable? Newness is fine, because that physical form never existed before.</p>\n<p>But inventive step is arguable. An examiner can say it is generally accepted that smaller particles tend to have higher bioavailability, so the result is obvious. You can push back with literature showing that this does not always happen, so your result was not a foregone conclusion.</p>\n<p>Both sides have a case, which is exactly the point. Inventive step is a matter of argument, and good arguments depend on the field and the situation.</p>\n<p>Now change one thing. You shrink the particle and it starts to show fluorescence. Here inventive step is much stronger, because nothing in the literature suggests that reducing particle size should produce fluorescence. The property is genuinely unexpected, so this is a far better candidate for a patent than the bioavailability case.</p>\n<h4>Third test: some real use</h4>\n<p>The third test is simply that the invention must have some use or industrial application. Clear all three and your invention can mature into a patent.</p>\n<h3 id=\"what-india-will-not-let-you-patent\">What India will not let you patent</h3>\n<p>On top of the three universal tests, each country adds its own exclusions. An invention can be new, inventive, and useful and still be refused, because the law in that country does not allow patents on that kind of thing.</p>\n<h4>What you can and cannot patent</h4>\n<p>In India you can patent a new medical device, a new drug, composition, or formulation, a new process for formulating a composition, a new process for assembling a device, and, in most cases, a software invention.</p>\n<p>What you cannot patent, and this has been settled for a long time with no change expected, is a method of treating a patient, a method of diagnosis, or a method of surgery. The same applies to farming and horticultural methods.</p>\n<h4>Where life forms fall</h4>\n<p>A naturally occurring microbe is not patentable, because it is closer to a discovery, with little or no human intervention. A recombinant strain, where you have changed the microbe's genetic makeup so it performs a new function, is patentable, because you added human intervention with an expected new use.</p>\n<p>Microbes can be patented as a form of life, but higher life forms, meaning plants and animals, cannot be patented in India. For contrast, the United States does allow plant patents, though not patents on higher animal life. The US once treated almost everything as patentable, but over the last several years it has added its own exclusions and moved closer to the rest of the world.</p>\n<h3 id=\"ten-practical-calls-founders-have-to-get-right\">Ten practical calls founders have to get right</h3>\n<p>Founders tend to underserve their IP. You are building a team, shipping a product, chasing clients, and keeping the company running, so patents slip. These ten pointers are where that neglect costs the most.</p>\n<h4>1. Timing is critical</h4>\n<p>Novelty is a requirement, and your own actions can destroy it. If you start selling or marketing before you have filed, that public disclosure of your own product can bar you from patenting your own invention, even though you were first. So file before you disclose to third parties, sell, or market.</p>\n<p>This also comes up at fundraising. Investors ask whether you have a monopoly, or whether someone with deeper pockets could copy you in three months. If you never built a barrier, a bigger competitor can copy your product and push you out.</p>\n<h4>2. Nail down who owns the IP</h4>\n<p>Do not assume that because you own the company, you own the inventions created inside it. If your employment contracts do not clearly say that employees assign their inventions to the company, ownership is uncertain. The same goes for contractors who work for several clients, and for interns.</p>\n<p>Investors and funding agencies will ask who really owns the IP, and any doubt makes them hesitate, because ownership can be challenged later.</p>\n<p>One case shows the risk. A person in the telecom sector had an employment contract assigning everything he created to his employer. His employer then sponsored him for a PhD at an academic institute whose terms did not line up with that earlier commitment, and the result was a dispute over who owned the work.</p>\n<p>Put the agreements in place up front, and if ownership is meant to be joint, write that down too.</p>\n<h4>3. Name inventors correctly</h4>\n<p>Ownership and inventorship are different things. Ownership is about who holds the rights. Inventorship is about who actually contributed to the invention. If fifteen people work on a project, that does not make all fifteen inventors. Inventors are the people who contributed intellectually and solved problems, not those who carried out instructions.</p>\n<p>Getting this right can have financial consequences. In Germany, the constitution requires that inventors be compensated, around seven percent of the profits, when a product is commercialized. So naming the wrong people costs money. Japan saw similar employee reward claims.</p>\n<p>Over-naming also creates a practical burden. If you list fifteen inventors to please people and ten of them leave, you end up chasing former staff for signatures on forms, and some of them were never real inventors. Ravi points to a company where the chairperson is listed on every single patent, despite not having been in the lab for fifteen years, which is not a fair record of who invented what.</p>\n<h4>4. Disclose the right amount, no more</h4>\n<p>A patent office grants a patent only if you disclose the invention fully. The standard is that a person skilled in that field should be able to read your application and work the invention.</p>\n<p>Disclose too little and you get rejected, because the office is not convinced you actually hold the invention. Disclose too much and you have handed your trade secrets to the public and to competitors.</p>\n<p>For example, your lab may run at certain settings, and you may suspect that scaling up will need different ones. That scale-up knowledge is a trade secret. There is no reason to put it in the application.</p>\n<p>This balance is a moving target, because the office expects more over time. The same disclosure that earned a patent ten years ago may not be enough today, which is where experienced IP advice earns its keep.</p>\n<h4>5. Build protection in layers</h4>\n<p>A single layer is usually not enough. A medical device might be covered by a patent, but you should also consider a design registration for its look, copyright for any software, and trademarks and trade names for branding.</p>\n<p>Even within one product you can hold several patents. A handheld PCR device can carry one patent for the whole device, a separate patent for the cartridge that goes in, and another for the system that moves fluid.</p>\n<p>The value of layering is that it protects you if one patent fails. If a competitor or the patent office knocks out one patent or design, the others still stand and your monopoly holds.</p>\n<h4>6. Know your current and future markets</h4>\n<p>Filing strategy follows where you will make and sell, and that can span continents. Imagine your R&amp;D is in India, you manufacture in Vietnam for cost reasons, you distribute through Singapore, and your real market is the US. If you hold only an Indian patent, you have no protection against copying in Vietnam, none around your Singapore distribution point, and none in the US, which is your main market.</p>\n<p>You cannot always afford to file everywhere at once, so the law lets you defer. Under the Paris Convention, once you file your first application you have one year to add any member country, and there are more than 175 members.</p>\n<p>The PCT, or Patent Cooperation Treaty, goes further. You file a single generic application that does not itself become a patent, and it reserves your right to enter any of roughly 150 member countries for two and a half years from your first filing. You spend less up front while keeping the right to add countries later, as your funding and your inventions develop.</p>\n<h4>7. Search early, check freedom to operate later</h4>\n<p>Two different searches serve two different moments. A patentability search checks whether your idea is new and inventive. It is cheap and fast, so run it early and across many ideas to get a sense of direction.</p>\n<p>Freedom to operate, also called FTO, asks a different question. Can you sell this product without being sued for infringing someone else's patent? Do FTO once a project gains traction, when there are good lab results, investor interest, and a product likely to reach the market within months to a year.</p>\n<p>The two can point opposite ways. Your handheld PCR device may pass a patentability search overall, yet an FTO can come back negative because the cartridge that goes into it is already patented by someone else in India. That means the moment you start selling, you risk a suit from the cartridge's owner.</p>\n<p>Rough Indian budgets look like this.</p>\n<ul>\n<li>A patentability search runs about ₹25,000 to ₹60,000.</li>\n<li>An FTO runs about ₹1 to ₹2 lakh per technology or product, and more for other countries.</li>\n<li>A due diligence audit of a small India-based portfolio of five or six patents runs perhaps ₹2 to ₹3 lakh. This varies a lot.</li>\n</ul>\n<p>Due diligence itself is broader than FTO. It is an IP audit that investors run on you. They look at how big and strong your portfolio is, which countries it covers, and whether you have sent or received any legal notices.</p>\n<h4>8. Chase quality, not quantity</h4>\n<p>Even a patent practitioner will tell you a portfolio can cost a lot and earn nothing. Ravi calls a bloated portfolio a “white elephant”. Many companies hold plenty of patents and cannot make money from them, either by product or by licensing, while some smart young companies do very well with just eight to ten strong patents.</p>\n<p>In a technology business you do want enough of a barrier to deter competitors. But be deliberate about how much you invest, and put quality and timelines ahead of raw count.</p>\n<h4>9. Use regional filing routes</h4>\n<p>Although patents are granted country by country, several regions let one application cover many countries. A single European application covers more than 40 countries, and the UK is still covered for patents despite Brexit, which matters more for trademarks.</p>\n<p>One Eurasian application covers eight countries. In Africa, an ARIPO application covers around 20 countries and an OAPI application covers 17 more that do not overlap, so two filings can reach roughly 40 African countries. In the Middle East, a single GCC application covers six countries. The PCT sits on top of all of this, with roughly 153 member states.</p>\n<h4>10. Litigation is rising, and it is a pharma story</h4>\n<p>Patent litigation in India is increasing. Looking at the decade from 2010 to 2020, the top ten litigators are all pharmaceutical and biopharmaceutical companies, with notable activity in telecom as well. It is a trend worth watching, even if you hope never to be part of it.</p>\n<p>---</p>", "toc": [["What you are really getting when you get a patent", "what-you-are-really-getting-when-you-get-a-patent"], ["The three tests every invention must pass", "the-three-tests-every-invention-must-pass"], ["What India will not let you patent", "what-india-will-not-let-you-patent"], ["Ten practical calls founders have to get right", "ten-practical-calls-founders-have-to-get-right"]], "qa": [{"q": "How does traditional knowledge affect patentability?", "a": "<p>Traditional knowledge, especially around medicine, is often passed down rather than written, which historically let some patents be granted wrongly for things that were already known. The landmark example is turmeric.</p>\n<p>About twenty to twenty-five years ago, a person of Indian origin based in the US obtained a US patent for the wound-healing property of turmeric. CSIR was tasked with challenging it, and Ravi's firm represented the Indian side in the US. At the time, US re-examination was an ex-parte process. This means you could only submit documents and written arguments, and you could not argue the case in person.</p>\n<p>The patent holder narrowed his claim to wounds that were surgically inflicted. The patent was knocked out using a document from around 1856, in Persian, obtained from Hamdard University in Delhi and submitted with a certified English translation. It described how, after childbirth, the cut umbilical cord, which is a surgically inflicted wound, was treated with turmeric to help it heal. That became the closest prior art.</p>\n<p>This case is part of why India documented its traditional knowledge into a database that many patent offices now consult during their searches.</p>"}, {"q": "Algorithms and software are hard to patent in India. How do we protect ours?", "a": "<p>Software is not patentable on its own in India, but the path is to frame it as a technical solution to a technical problem. If your program transmits data faster or encrypts it better, that is a real technical problem being solved, and you focus the application on that. India's position is close to Europe's, and the US has moved the same way after a run of court decisions that rejected vague software claims.</p>\n<p>A well-framed application can be granted in India, Europe, and the US. A hardware element, if you have one, only strengthens the case. In practice, you often file in India first and then go international.</p>"}, {"q": "How are monoclonal antibodies treated in India, the US, and Europe?", "a": "<p>Focus on the sequence and show human intervention. A naturally occurring antibody is a problem, but if you focus on the critical part of the sequence and the human intervention involved, you can patent the sequence and the antibody. A method of treating a disease with the antibody fails in India but is fine in the US, and in Europe you can reword it as a “use” claim.</p>\n<p>The same logic covers hybridoma-derived antibodies without affinity maturation, and much of life sciences including diagnostics. As long as you can show human intervention rather than mere isolation, you have a good case.</p>"}, {"q": "How many ideas can one patent application protect?", "a": "<p>More than one, as long as they share what is called unity of invention. For a computer mouse, a single application can claim the mouse itself, the method of assembling it, and the method of using it to click and access data, because all three are unified around the same invention. Unrelated concepts need to be assessed separately.</p>"}]}, "trademarks": {"title": "Only Trademarks! (Part 3 of Only One Theme: An Awareness Campaign on Innovation Management)", "shortTitle": "Trademarks", "speaker": "Sudeshna Banerjee, Partner at K&S Partners", "role": "Advises clients on prosecution and enforcement of trademarks, copyrights, and domain names. Handles opposition and cancellation proceedings before the Trade Marks Registry and IPAB. Advises on protecting and enforcing trademarks in foreign jurisdictions, and on domain name complaints before WIPO and NIXI.", "overview": "A working guide to choosing, filing, and defending a trademark. It covers what actually counts as a strong mark, how India and other countries reject weak or conflicting marks, and the paperwork habits that let a business prove and keep its brand.", "videoId": "CLXTSzBH3_E", "videoUrl": "https://www.youtube.com/watch?v=CLXTSzBH3_E", "duration": "1 hour 4 min", "readMin": 16, "articleMin": 11, "takeaways": "<p>If you are choosing or managing a brand name, this is what a trademark lawyer wants you to know first.</p>\n<ul>\n<li>Marks fall on a strength spectrum. Invented words like fanciful or coined marks and unrelated real words like arbitrary marks get the strongest protection but need more marketing effort. Descriptive marks, such as “World's Best Burger,” are usually refused outright.</li>\n<li>A mark can “die” a generic death. Escalator, Kleenex, and aspirin all lost their trademark status because the public started using the brand name for the product itself, which is why companies like Google and Microsoft police how their marks are used.</li>\n<li>Filing the right goods and services matters as much as the mark itself. Applying under a broad “class heading” invites objections and opposition, while precisely listing your actual goods and services lets even similar marks coexist.</li>\n<li>A registration alone does not protect you. You must actually use the mark, and in the US you must prove continued use in years 5 to 6 and again in years 9 to 10 of a 10 year term, or the registration can be cancelled or refused renewal.</li>\n<li>Trademark rights are territorial. An Indian registration protects you only in India, so you must file separately in any other country where you do business, partly to block fraudulent registrations in places like China.</li>\n<li>The right time for a startup to file is the moment the mark is finally decided, not before and not after commercial use begins, because an application cannot be amended once filed.</li>\n</ul>\n<p>---</p>", "summary": "<p><strong>What counts as a trademark.</strong> A trademark is any distinctive mark, symbol, sign, or logo that lets consumers tell one company's goods or services apart from another's. A company or trade name, such as Tata, Wipro, or Infosys, can itself function as a trademark, and consumers link that name to the quality they expect from the company.</p>\n<p><strong>Choosing a mark.</strong> A trademark works as a source identifier, so it should align with the business and be memorable to consumers. It must also be legally distinctive enough to register and to enforce, which means avoiding descriptive or deceptive names. Brand value builds only through continued use, which adds goodwill and reputation over time.</p>\n<p><strong>The strength spectrum.</strong> Fanciful or coined marks (invented words) and arbitrary marks (real words unconnected to the product) get the highest protection but need heavy marketing to build recognition. Suggestive marks, like Airbus for airplanes or Netflix for streaming, need less effort because they hint at the product. Descriptive marks, which describe the goods outright, are usually refused, and generic marks, like “clock” for clocks, cannot be registered at all.</p>\n<p><strong>Genericide.</strong> A mark can become so famous it turns into the everyday word for the product itself, losing legal protection. Escalator, Kleenex, aspirin, and Xerox are the classic examples, which is why large companies actively control how their marks are referenced.</p>\n<p><strong>Classes and goods and services.</strong> India's Trademark Act organizes all goods and services into 45 classes. Software often falls under Class 9 (apps) and Class 42 (non-downloadable services), retail under Class 35, and food and beverage under Class 43. Filing under the broad “class heading” rather than your specific goods and services invites objections and third party opposition.</p>\n<p><strong>Grounds for refusal.</strong> Absolute grounds cover non-distinctive, descriptive, geographical, or scandalous marks, such as “USA Roadside” or a mark refused for containing “Indian” on flush toilets. Relative grounds cover conflict with existing marks, based on similar sound, appearance, meaning, or overlapping goods and services, such as t-shirts and hats sold from the same shop.</p>\n<p><strong>Use it or lose it.</strong> Even a registered mark offers little protection if you never use it, since enforcement depends on showing consumers associate the mark with you. The US requires proof of continued use partway through and near the end of each 10 year term, while India allows non-use cancellation by any third party if a mark sits unused.</p>\n<p><strong>Well-known marks.</strong> As of the talk, 117 marks were recognized as well-known in India. Since a 2017 rule change, marks can be declared well-known directly by the Trade Mark Registry, not only by courts, and this status blocks use of the mark even on unrelated goods, as with Mercedes-Benz on nail polish or undergarments.</p>\n<p><strong>Keeping the house in order.</strong> Track ownership changes, renewal deadlines (registrations run 10 years and can be renewed indefinitely), and the exact goods and services your registration covers, updating as your business changes. Preserve invoices, dated advertisements, and promotional material as evidence of first use, since trademark rights are territorial and must be filed separately in every country where you operate.</p>\n<p>---</p>", "article": "<h3 id=\"what-a-trademark-actually-protects\">What a trademark actually protects</h3>\n<p>A trademark can be any distinctive mark, symbol, sign, or logo that helps consumers tell the goods or services of one company apart from another's. It is not limited to logos. A company's own name or trade name, such as Tata, Wipro, or Infosys, can also function as a trademark.</p>\n<p>A trademark sits in the consumer's mind as a promise of quality. Tata, the speaker notes, spans everything from software to table salt, and one of India's most recognized brands, because people associate the name with trust, value, reputation, and quality, not with any single product category.</p>\n<h3 id=\"what-to-weigh-before-adopting-a-mark\">What to weigh before adopting a mark</h3>\n<p>A trademark's first job is to act as a unique source identifier, so consumers can associate a product with the company behind it. Businesses generally try to align their chosen mark with what they do, so the connection is easy for consumers to make.</p>\n<p>There is also a legal test to clear. A mark needs to be distinctive enough to be registered and, just as important, enforceable against third parties later. That means avoiding marks that are merely descriptive or deceptive from the start.</p>\n<p>Finally, a trademark builds brand value only through use. Continued use over time adds to a company's goodwill and reputation, which is what ultimately makes the mark valuable as a business asset.</p>\n<h3 id=\"the-strength-spectrum-from-strongest-to-weakest\">The strength spectrum, from strongest to weakest</h3>\n<p>Trademarks fall along a hierarchy based on how distinctive they are, and that hierarchy determines both how much protection a mark gets and how much marketing effort it will take to make it stick.</p>\n<p>At the top are fanciful or coined marks, invented words with no independent meaning, often formed by joining two existing words. These get the highest degree of protection, but a startup adopting one has to spend extra effort educating the public that the invented word belongs to a specific company and product.</p>\n<p>Arbitrary marks sit at a similarly high level. These are real words that carry a meaning, just not one connected to the goods or services they are used for. Like coined marks, they also require real marketing investment to link the word to the business in consumers' minds.</p>\n<p>Suggestive marks come next. These hint at the product without describing it outright. Airbus, used for airplanes, and Netflix, used for streaming, are the examples given. Because they carry some reference to what the company actually offers, less marketing effort is needed to build the connection.</p>\n<p>Descriptive marks sit near the bottom of the hierarchy. These directly describe the goods or services on offer, and registries generally refuse them, because no single company should be able to monopolize a word that other businesses in the same field need to describe their own products. Examples cited include “USA Roadside,” “World's Best Burger,” and “Creamy” for yogurt. A descriptive mark can occasionally become registrable, but only after acquiring what is called secondary meaning, meaning continuous use not for 5 or 10 years, but typically for 20 to 30 years or more.</p>\n<p>Generic marks are at the very bottom and cannot be registered under any circumstances. Using the word “clock” as a trademark for clocks or timepieces will simply be refused.</p>\n<h3 id=\"when-a-mark-dies-a-generic-death\">When a mark dies a generic death</h3>\n<p>A mark can become a victim of its own success. If a brand becomes so dominant that the public starts using its name for the product category itself, it can lose its trademark meaning entirely, a phenomenon the speaker calls a generic death.</p>\n<p>Escalator is now defined in the dictionary as a series of moving stairs, not as a brand. Kleenex, aspirin, and Xerox followed a similar path, with people saying they need “two copies of Xerox” rather than “two photocopies.” Because of this risk, large companies like Google and Microsoft maintain detailed guidance on how their marks should and should not be used in public language, to keep their trademarks from slipping into everyday generic speech.</p>\n<h3 id=\"identifying-the-right-goods-and-services\">Identifying the right goods and services</h3>\n<p>Under the Trademark Act, all goods and services fall into 45 classes, and correctly identifying which classes and which specific goods and services apply to your business is essential. Software services, for instance, generally fall under Class 9 for things like mobile apps, and Class 42 for non-downloadable website services or research and development. Retail services fall under Class 35, and food and beverage services fall under Class 43.</p>\n<p>It is advisable to avoid filing under the broad “class heading,” the general description of an entire class, because that heading covers a huge range of goods and services you may never actually provide. Filing broadly invites objections and opposition from third parties whose actual business overlaps with your overly wide claim. Two illustrative examples came up in the talk: one mark, “Rapid,” was filed with a long list of goods and services under a broad heading and became opposed, while a similarly named mark, “Rapid Ride,” precisely listed only the specific services it actually offered, such as research and development relating to computer hardware and software, and was registered without the same conflict. A second pair, “Grid iOS” and “Grid iON,” were both registered in the same class because each applicant had clearly and separately identified its own specific goods and services, letting closely similar marks coexist.</p>\n<h3 id=\"searching-before-you-file\">Searching before you file</h3>\n<p>Before adopting a mark, a search can be run in a few different ways: a general Google search, a search of the Registrar of Companies records if registering a company name, and a search of the Trade Marks Registry's own records. Even a completely coined, unique word may not turn up an identical match, but the search can surface marks that are deceptively similar in sound or appearance. Only after this search can an applicant reasonably judge whether they are clear to proceed.</p>\n<h3 id=\"grounds-on-which-an-application-can-be-refused\">Grounds on which an application can be refused</h3>\n<p>Once filed, an application is examined and can be refused on absolute grounds or relative grounds, and the categories are broadly similar across most jurisdictions, including India, China, and the European Union.</p>\n<p>Absolute grounds relate to the mark itself, regardless of any other mark. These include non-distinctiveness, where the mark merely describes the goods or services (examples given were “USA Roadside” and “World's Best Burger”), marks that are primarily a geographical name or a surname, marks that discriminate against a flag, emblem, or nationality, and marks containing scandalous or immoral matter. One cited example was a mark using the word “Indian,” which was refused for use on flush toilets. In China, marks incorporating the name of a state are similarly refused. The European Union's IPO examines applications only on absolute grounds at the filing stage, and treats descriptiveness, non-distinctiveness, customary signs, conflicts with public policy, and conflicts with geographical indications especially strictly, since the EU takes protection of traditional wine and spirit terms very seriously. Marks rejected in the EU on these grounds have included ones containing “Eco” (implying ecological or green), “Pro” (implying professional), “C” for juices (implying vitamin C), the phrase “Save Our Earth,” and a plain exclamation mark, treated as a customary sign. Not everything fails though. A mark like “Lost Lounge,” filed for Class 25 goods such as clothing, footwear, and headgear, was accepted, along with shapes unrelated to the goods themselves.</p>\n<p>Relative grounds concern conflict with an existing mark and the risk of consumer confusion. In the United States, this test is applied at a high level, weighing the sound, appearance, meaning, and overall commercial impression of the conflicting marks, as well as the goods and services involved, and US examiners check for conflicts even in classes related to, but different from, the one actually filed. India traditionally examines only within the exact class filed, though the speaker noted some examiners have begun checking adjacent classes as well. Examples of likely conflict included “City Market” against a differently spelled but phonetically identical mark, since sound alone can create confusion; a word mark against a stylized or device mark using the same word, since consumers register the underlying word rather than the font or styling; overlapping goods, such as t-shirts, pants, and hats sold from the same retail shop, even if an applicant does not sell all three categories; and closely related services, such as banking services and mortgage lending services. One instructive case from the EU IPO involved an earlier registered mark, “MASSA,” against a later application for “MESSI,” filed by the footballer Lionel Messi. The EU General Court allowed the Messi mark to proceed, holding that his personal reputation was a relevant factor establishing a conceptual difference between the two marks, distinct from a pure side-by-side textual comparison.</p>\n<h3 id=\"use-marketing-and-the-symbols-that-go-with-it\">Use, marketing, and the symbols that go with it</h3>\n<p>A registration on paper is not enough. If a mark is not actually used and promoted, consumers will not associate it with the company, and enforcing rights against a third party becomes very difficult even with a valid registration in hand. The mark actually used in the marketplace should also closely match the mark as filed and registered, since a large divergence between the two weakens the statutory protection.</p>\n<p>Correct symbol use matters too. The TM symbol can be used once an application is filed, and the registered ® symbol should be used only once registration is granted, and only over the specific registered element of the name, not generic add-ons like “Private Limited” appended to a company's registered brand name.</p>\n<p>Continued use requirements differ by country. In the United States, a trademark registration lasts 10 years, but the owner must show proof of use between years 5 and 6, and again between years 9 and 10, or risk losing the registration. If a US mark is filed on a “proposed to be used” basis before commercial use begins, the applicant has 3 years after acceptance to show actual use, or the application will not proceed to registration. India permits filing on a similar “proposed to be used” basis, and use can be claimed at any point afterward, but a mark left unused in India can still face a non-use cancellation action brought by any third party.</p>\n<h3 id=\"well-known-marks\">Well-known marks</h3>\n<p>As of the talk, 117 marks were recognized as well-known marks in India by the Trade Marks Registry. Previously, only courts could declare a mark well-known, but a 2017 amendment to the Trade Mark Rules created a direct application process before the Registry itself. The benefit of well-known status is broad, deemed protection across all 45 classes, even in classes where the mark owner holds no registration. Mercedes-Benz, declared well-known by courts rather than the Registry, is the example given: its mark cannot be used on entirely unrelated products, and it has been used to stop unauthorized use of the Mercedes name on things like nail polish and undergarments.</p>\n<h3 id=\"keeping-a-trademark-portfolio-in-order\">Keeping a trademark portfolio in order</h3>\n<p>Several ongoing habits protect a growing brand. Ownership records at the Registry need to be kept accurate, especially after an application is assigned from an individual to a newly formed company, or after any other change in ownership, with proper supporting documentation for each change.</p>\n<p>Renewal deadlines need active tracking, since a registration is valid for 10 years and renewable indefinitely afterward. Some of the oldest live trademarks still in force were originally filed more than 100 years ago, which shows how long-lived and valuable a well-maintained registration can become.</p>\n<p>Even without a formal registration, a business can build common law protection by preserving supportive evidence: invoices, the date of first use, copies of promotional material, third party publications, and any awards or recognitions tied to the mark. If the actual mark used has diverged into a stylized or logo form distinct from a plain word mark, both versions should be separately protected, since protection for the word form does not automatically extend to a highly stylized version.</p>\n<p>As a business grows, its registered goods and services need to be reviewed. New products or services introduced after an old registration may not be covered by it, requiring a fresh application, and goods or services no longer offered under the mark should be considered for deletion from the registration, to avoid inviting a future non-use cancellation.</p>\n<h3 id=\"territoriality-and-enforcement\">Territoriality and enforcement</h3>\n<p>A trademark registration is territorial. An Indian registration protects a mark only within India, and any use of that mark in another country requires a separate registration filed in that jurisdiction. This also matters for defense, since separately registering in each country of interest helps guard against fraudulent registrations of your own mark by third parties, a problem the speaker flagged as especially significant in jurisdictions like China.</p>\n<p>Enforcement against unauthorized use typically escalates gradually: legal notices and cautionary notices (including published newspaper notices) come first, and litigation is reserved for later, since it is more costly. Regular monitoring through trademark watch services helps catch conflicts early and is far cheaper than a full-fledged legal dispute.</p>\n<h3 id=\"evidence-to-preserve-from-day-one\">Evidence to preserve from day one</h3>\n<p>To support both brand building and any future enforcement action, the speaker recommended preserving a wide range of documentation from the earliest use of a mark: records of any successful legal actions or published cautionary notices, original dated advertisements from the first use of the mark onward, product brochures, and invoices that specifically reference the mark or product rather than only a generic description. Letters of recommendation, awards, photographs, certified copies of any legal proceedings, and extracts from annual reports (which capture revenue tied to a particular brand) all strengthen a later case. Sales and advertising figures broken out specifically for the brand, rather than folded into overall business figures, and instances of unsolicited media coverage, are also valuable and often overlooked. Maintaining a regular trademark watch in the marketplace and registering matching domain names round out the practical protection strategy.</p>\n<p>---</p>", "toc": [["What a trademark actually protects", "what-a-trademark-actually-protects"], ["What to weigh before adopting a mark", "what-to-weigh-before-adopting-a-mark"], ["The strength spectrum, from strongest to weakest", "the-strength-spectrum-from-strongest-to-weakest"], ["When a mark dies a generic death", "when-a-mark-dies-a-generic-death"], ["Identifying the right goods and services", "identifying-the-right-goods-and-services"], ["Searching before you file", "searching-before-you-file"], ["Grounds on which an application can be refused", "grounds-on-which-an-application-can-be-refused"], ["Use, marketing, and the symbols that go with it", "use-marketing-and-the-symbols-that-go-with-it"], ["Well-known marks", "well-known-marks"], ["Keeping a trademark portfolio in order", "keeping-a-trademark-portfolio-in-order"], ["Territoriality and enforcement", "territoriality-and-enforcement"], ["Evidence to preserve from day one", "evidence-to-preserve-from-day-one"]], "qa": [{"q": "If a company's name is already a registered trademark and the company later changes the name slightly, such as a single word, should a new application be filed, or can the existing registration be updated?", "a": "<p>If the change is not significant, the existing mark can continue to be used without a new filing. If the change is more meaningful, for instance if it changes how the mark is pronounced or alters a significant word, filing a new application gives better protection. If a new application is filed, the earlier registered mark can still be cited to help establish that the new mark belongs to the same applicant.</p>"}, {"q": "For a startup or entrepreneur, when is the right time to start thinking about trademark registration?", "a": "<p>The right moment is once the mark has been finally decided, not before. Once an application is filed, the mark itself cannot be amended. If a business changes its mind about the mark even six months later, it cannot modify the existing application; it must file an entirely fresh one. So the advice is to finalize the mark first, then file immediately.</p>"}, {"q": "Are there real examples of trademark filing being beneficial for a startup, particularly with investors?", "a": "<p>Many startups only approach a trademark lawyer once investors specifically ask whether a trademark has been filed, which can be a difficult stage to discover, for the first time, that the desired mark is unavailable or conflicted. Since a trademark is a commercializable form of intellectual property, investors increasingly expect it to be addressed early. India also offers reduced government fees for startups: the standard official fee is 9,000 rupees, reduced to 4,500 rupees for applicants holding a valid startup or MSME certificate. Having a mark that is already clear, ideally already registered, is a real boost when approaching investors, compared to scrambling to address it under time pressure during fundraising.</p>"}, {"q": "For e-commerce platforms like Amazon, is a granted registration certificate required to list a product, or is a filed application sufficient?", "a": "<p>A filed application is sufficient. Registration itself can take a minimum of about 1 to 1.5 years, but the moment an application is filed, the applicant receives an application number, and the mark appears in the Trade Marks Registry's online records. That application number and the online record entry are generally what is needed to list a product on a platform like Amazon while registration is still pending.</p>"}]}};

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function go(hash){location.hash = hash ? '#/'+hash : '#/';}
function toggleVid(btn){
  const wrap = btn.nextElementSibling;
  if(wrap.hidden){
    if(!wrap.dataset.loaded){
      wrap.innerHTML = `<div class="vid"><iframe src="https://www.youtube-nocookie.com/embed/${btn.dataset.vid}?autoplay=1&rel=0" `
        + `title="Talk video" allow="autoplay;encrypted-media;picture-in-picture;fullscreen" allowfullscreen></iframe></div>`;
      wrap.dataset.loaded = '1';
    }
    wrap.hidden = false;
    btn.textContent = '✕ Hide video';
  } else {
    wrap.hidden = true;
    btn.textContent = btn.dataset.label;
  }
}

function renderHome(){
  const cards = Object.entries(TALKS).map(([id,t])=>`
    <article class="row" onclick="go('talk/${id}')">
      <div class="main">
        <h2>${esc(t.shortTitle)}</h2>
        <p class="who">${esc(t.speaker)}</p>
        <p class="ov">${esc(t.overview)}</p>
        <div class="rmeta">
          <span>▶ ${esc(t.duration||'watch')}</span>
          <span>◷ ${t.readMin} min read</span>
        </div>
      </div>
      <div class="chev" aria-hidden="true">→</div>
    </article>`).join('');
  return `
    <section class="hero">
      <p class="eyebrow">Only One Theme · Innovation Management</p>
      <h1>IP talks, distilled</h1>
    </section>
    <div class="list">${cards}</div>`;
}

function renderTalk(id){
  const t = TALKS[id];
  if(!t) return renderHome();
  const toc = (t.toc||[]).map(([title,slug])=>`<a href="#/talk/${id}#${slug}" data-slug="${slug}">${esc(title)}</a>`).join('');
  const qa = (t.qa||[]).map(item=>`
    <details class="qa">
      <summary><span class="tw">+</span><span>${item.q}</span></summary>
      <div class="content">${item.a}</div>
    </details>`).join('');
  const video = t.videoId ? `
    <div class="watch">
      <button class="watchbtn" data-vid="${t.videoId}" data-label="▶ Watch the talk here${t.duration?` (${esc(t.duration)})`:''}" onclick="toggleVid(this)">▶ Watch the talk here${t.duration?` (${esc(t.duration)})`:''}</button>
      <div class="vidwrap" hidden></div>
    </div>` : '';
  return `
   <a class="back" href="#/" >← All talks</a>
   <div class="blog blayout">
     <div>
       <div class="bhead">
         <h1>${esc(t.shortTitle)}</h1>
         <p class="full">${esc(t.title)}</p>
         <p class="who"><b>${esc(t.speaker)}</b> · ${esc(t.role)}</p>
       </div>
       ${video}
       <details class="sect key" open>
         <summary><span class="stitle">Key takeaways · what you'll learn</span><span class="tw">+</span></summary>
         <div class="content">${t.takeaways}</div>
       </details>
       <details class="sect">
         <summary><span class="stitle">Summary</span><span class="tw">+</span></summary>
         <div class="content">${t.summary}</div>
       </details>
       <details class="sect">
         <summary><span class="stitle">Full article</span><span class="smeta">${t.articleMin} min read</span><span class="tw">+</span></summary>
         <div class="content" id="article">${t.article}</div>
       </details>
       ${qa ? `<details class="sect">
         <summary><span class="stitle">Questions from the audience</span><span class="smeta">${t.qa.length} question${t.qa.length!==1?'s':''}</span><span class="tw">+</span></summary>
         <div class="content">${qa}</div>
       </details>` : ''}
       <div class="endnote">Prefer to watch? <a href="${t.videoUrl}" target="_blank" rel="noopener">See the full talk on YouTube (${esc(t.duration||'')})</a>.</div>
     </div>
     <aside class="toc">
       <h3>On this page</h3>
       ${toc}
     </aside>
   </div>`;
}

function route(){
  const h = location.hash.replace(/^#\//,'');
  const app = document.getElementById('app');
  let anchor = '';
  let m = h.match(/^talk\/([^#]+)(?:#(.+))?$/);
  if(m){
    app.innerHTML = renderTalk(m[1]);
    anchor = m[2]||'';
  } else {
    app.innerHTML = renderHome();
  }
  window.scrollTo(0, 0);
  if(anchor){ const el=document.getElementById(anchor); if(el){ const d=el.closest('details'); if(d) d.open=true; el.scrollIntoView(); } }
  setupToc();
}

function setupToc(){
  const links = [...document.querySelectorAll('aside.toc a')];
  if(!links.length) return;
  links.forEach(a=>a.addEventListener('click',e=>{
    e.preventDefault();
    const el=document.getElementById(a.dataset.slug);
    if(el){ const d=el.closest('details'); if(d && !d.open) d.open=true;
      el.scrollIntoView(); history.replaceState(null,'',a.getAttribute('href')); }
  }));
  const heads = links.map(a=>document.getElementById(a.dataset.slug)).filter(Boolean);
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(en.isIntersecting){
        const id=en.target.id;
        links.forEach(a=>a.classList.toggle('on', a.dataset.slug===id));
      }
    });
  },{rootMargin:'-70px 0px -75% 0px'});
  heads.forEach(h=>obs.observe(h));
}

window.addEventListener('hashchange', route);
if(!location.hash) location.hash = '#/';
route();
</script>
</body>
</html>
